", "名前を覚えます。", "Ich merke mir den Namen.", "Anders als 思い出す (sich erinnern): aktiv ins Gedächtnis aufnehmen"]],
    levelQuiz: {
      A1: [["Ich stehe um sieben Uhr auf.", "七時に起きます。"], ["Ich esse Brot.", "パンを食べます。"], ["Ich trinke Kaffee.", "コーヒーを飲みます。"], ["Ich gehe zur Arbeit.", "仕事に行きます。"], ["Ich schlafe um zehn.", "十時に寝ます。"], ["Ich wasche mein Gesicht.", "顔を洗います。"], ["Ich gehe nach Hause.", "家に帰ります。"], ["Ich lese die Zeitung.", "新聞を読みます。"], ["Ich putze die Zähne.", "歯を磨きます。"], ["Ich höre Musik.", "音楽を聴きます。"]],
      A2: [["Heute Morgen bin ich früh aufgestanden.", "今朝、早く起きました。"], ["Gestern habe ich japanisches Essen gegessen.", "昨日、日本食を食べました。"], ["Ich fahre jeden Tag mit dem Fahrrad zur Arbeit.", "毎日自転車で仕事に行きます。"], ["Nach dem Abendessen schaue ich gerne fern.", "夕食の後、テレビを見るのが好きです。"], ["Am Wochenende schlafe ich gerne länger.", "週末は長く寝るのが好きです。"], ["Ich dusche immer am Morgen vor der Arbeit.", "いつも仕事の前にシャワーを浴びます。"], ["Nach dem Essen putze ich mir die Zähne.", "食事の後に歯を磨きます。"], ["Am Abend mache ich noch ein bisschen Sport.", "夕方に少し運動します。"], ["Ich höre im Bus immer Podcasts.", "バスではいつもポッドキャストを聴きます。"], ["Bevor ich schlafe, lese ich noch ein Kapitel.", "寝る前に章を一つ読みます。"]],
      B1: [["Ich denke, dass eine gute Morgenroutine den Tag positiv beeinflusst.", "良い朝のルーティンは一日に良い影響を与えると思います。"], ["Obwohl ich müde war, bin ich heute früh aufgestanden.", "疲れていたけれど、今日は早く起きました。"], ["Wenn ich abends früher ins Bett gehe, fühle ich mich besser.", "夜早く寝ると、気分が良くなります。"], ["Mein größtes Problem ist, dass ich morgens nie genug Zeit habe.", "一番の問題は、朝に時間が足りないことです。"], ["Nach dem Frühstück lese ich kurz die Nachrichten am Handy.", "朝ご飯の後、携帯でニュースを少し読みます。"], ["An meinen freien Tagen schlafe ich gerne aus.", "休みの日はゆっくり寝るのが好きです。"], ["Ich versuche, jeden Morgen ein gesundes Frühstück zu essen.", "毎朝、健康的な朝食を食べるようにしています。"], ["Mein Tag beginnt mit einer Tasse Kaffee und etwas Stille.", "私の一日はコーヒー一杯と少しの静けさで始まります。"], ["Wenn ich gestresst bin, mache ich kurz Yoga zum Ausgleich.", "ストレスがあるときは、少しヨガをしてバランスを取ります。"], ["Es ist mir wichtig, abends genug Zeit für mich selbst zu haben.", "夜は自分のための時間を十分に持つことが大切です。"]],
      B2: [["Seitdem ich meditiere, fühle ich mich morgens deutlich konzentrierter und ruhiger.", "瞑想を始めてから、朝はずっと集中でき、心が落ち着いています。"], ["Eine feste Abendroutine ist mindestens genauso wichtig wie ein guter Tagesbeginn.", "規則正しい夜のルーティンは、良い朝のスタートと同じくらい大切です。"], ["Wer schlecht schläft, kann am nächsten Tag kaum produktiv arbeiten.", "よく眠れないと、翌日に集中して働くのは難しいです。"], ["Statt morgens lange im Bett zu liegen, gehe ich lieber sofort joggen.", "朝にベッドでだらだらするより、すぐにジョギングに行く方が好きです。"], ["Den meisten Menschen fällt es schwer, ihre Gewohnheiten dauerhaft zu ändern.", "多くの人にとって、習慣を長く変えるのは難しいことです。"], ["Eine konstante Routine hilft mir, mich auf das Wesentliche zu konzentrieren.", "規則的なルーティンは大切なことに集中するのに役立ちます。"], ["Obwohl ich Frühaufsteher bin, brauche ich erst einen Moment, bevor ich richtig wach bin.", "朝早く起きるほうですが、本当に目が覚めるまで少し時間がかかります。"], ["Tagesabläufe sind oft Spiegelbild unserer Persönlichkeit und Werte.", "日常のスケジュールは、私たちの個性や価値観を映し出しています。"], ["Wer abends auf das Handy verzichtet, schläft erfahrungsgemäß besser.", "夜に携帯電話を控える人は、経験的によく眠れます。"], ["Eine bewusste Pause am Nachmittag kann die Produktivität erheblich steigern.", "午後の意識的な休憩は、生産性を大きく高めることができます。"]],
      C1: [["Es ist erstaunlich, wie sehr eine gut strukturierte Morgenroutine das Wohlbefinden beeinflussen kann.", "良く構成された朝のルーティンが幸福感に与える影響は本当に驚くべきものです。"], ["Trotz aller Vorsätze gelingt es vielen nicht, ihre Gewohnheiten dauerhaft umzustellen.", "どんなに決意しても、習慣を長期的に変えることは多くの人にとって難しいです。"], ["Mein Schlafrhythmus hat sich im Laufe der Jahre dramatisch verschoben.", "私の睡眠リズムは長年にわたって大きく変わってしまいました。"], ["Wer den Tag mit Achtsamkeit beginnt, geht ihn meist mit größerer Gelassenheit an.", "マインドフルネスで一日を始める人は、たいていより落ち着いて過ごせます。"], ["Die Frage, wann man morgens optimal aufstehen sollte, beschäftigt die Wissenschaft seit Jahrzehnten.", "朝の最適な起床時間は、何十年も科学者を悩ませてきました。"]],
      C2: [["Die Kunst, einen ausgewogenen Tagesrhythmus zu kultivieren, erfordert Disziplin und Selbsterkenntnis.", "バランスの取れた日々のリズムを育む技術には、規律と自己認識が必要です。"], ["Es ist paradox, dass wir uns nach Routine sehnen und gleichzeitig vor ihrer Wirkung fliehen.", "私たちはルーティンを求めながらも、その束縛から逃れたがるのは矛盾しています。"], ["Während für die einen die Morgenstunden produktiv sind, kommen andere erst spät am Tag in Schwung.", "朝の時間が生産的な人もいれば、夕方になってようやく本領を発揮する人もいます。"], ["Die zunehmende Beschleunigung des modernen Lebens lässt vielen kaum Zeit für bewusste Pausen.", "加速し続ける現代社会では、意識的な休息を取る時間がほとんどありません。"], ["Eine gesunde Routine ist weniger eine Frage des Plans als der inneren Haltung.", "健康的なルーティンとは、計画よりも内なる姿勢の問題です。"]]
    }
  },
  1: {
    verbs: [["作る", "つくる", "kochen", "g", "料理を作ります。", "Ich koche Essen.", "Sehr universell: nicht nur kochen, auch basteln, gestalten, erstellen"], ["切る", "きる", "schneiden", "g", "野菜を切ります。", "Ich schneide Gemüse."], ["焼く", "やく", "backen, braten", "g", "パンを焼きます。", "Ich backe Brot."], ["茹でる", "ゆでる", "kochen (Wasser)", "i", "卵を茹でます。", "Ich koche Eier."], ["炒める", "いためる", "anbraten", "i", "野菜を炒めます。", "Ich brate Gemüse an."], ["食べる", "たべる", "essen", "i", "寿司を食べます。", "Ich esse Sushi."], ["飲む", "のむ", "trinken", "g", "お茶を飲みます。", "Ich trinke Tee."], ["注文する", "ちゅうもんする", "bestellen", "x", "ラーメンを注文します。", "Ich bestelle Ramen."], ["買う", "かう", "kaufen", "g", "パンを買います。", "Ich kaufe Brot.", "Gleiche Lesung wie 飼う (Tier halten) — Kanji entscheidet"], ["洗う", "あらう", "waschen", "g", "野菜を洗います。", "Ich wasche Gemüse."], ["味見する", "あじみする", "probieren", "x", "スープを味見します。", "Ich probiere die Suppe."], ["混ぜる", "まぜる", "mischen", "i", "材料を混ぜます。", "Ich mische die Zutaten."], ["並べる", "ならべる", "anrichten", "i", "お皿を並べます。", "Ich richte die Teller an."], ["温める", "あたためる", "aufwärmen", "i", "料理を温めます。", "Ich wärme das Essen auf."], ["冷やす", "ひやす", "kühlen", "g", "ビールを冷やします。", "Ich kühle das Bier."], ["揚げる", "あげる", "frittieren", "i", "天ぷらを揚げます。", "Ich frittiere Tempura.", "Achtung: 上げる (geben/heben) hat gleiche Lesung — anderer Kanji"], ["蒸す", "むす", "dämpfen", "g", "野菜を蒸します。", "Ich dämpfe Gemüse.", "Klassische japanische Kochtechnik (z.B. Chawanmushi)"], ["剥く", "むく", "schälen", "g", "リンゴを剥きます。", "Ich schäle einen Apfel.", "Für Obst, Gemüse, auch Krabben usw."], ["注ぐ", "そそぐ", "eingießen", "g", "お酒を注ぎます。", "Ich schenke Sake ein.", "Für Getränke ins Glas/in die Tasse"], ["片付ける", "かたづける", "aufräumen", "i", "食器を片付けます。", "Ich räume das Geschirr weg.", "Auch für Zimmer, Schreibtisch, Dokumente"]],
    levelQuiz: {
      A1: [["Ich koche.", "料理します。"], ["Ich esse Brot.", "パンを食べます。"], ["Ich trinke Tee.", "お茶を飲みます。"], ["Ich kaufe Gemüse.", "野菜を買います。"], ["Das ist lecker.", "美味しいです。"], ["Ich esse Reis.", "ご飯を食べます。"], ["Das ist süß.", "甘いです。"], ["Ich koche Suppe.", "スープを作ります。"], ["Die Suppe ist heiß.", "スープは熱いです。"], ["Ich liebe Schokolade.", "チョコレートが大好きです。"]],
      A2: [["Gestern habe ich Sushi gegessen.", "昨日、寿司を食べました。"], ["Ich möchte japanisch kochen lernen.", "日本料理を学びたいです。"], ["Im Restaurant bestelle ich Ramen.", "レストランでラーメンを注文します。"], ["Vor dem Kochen wasche ich das Gemüse.", "料理する前に野菜を洗います。"], ["Das Essen schmeckt sehr gut.", "料理はとても美味しいです。"], ["Heute Abend probiere ich ein neues Rezept aus.", "今晩、新しいレシピを試します。"], ["Ich habe Mittagessen für die ganze Familie gekocht.", "家族全員のために昼食を作りました。"], ["Das Restaurant hat ausgezeichnete Bewertungen erhalten.", "あのレストランは素晴らしい評価を得ています。"], ["Mein Großvater kann sehr gut traditionell kochen.", "祖父は伝統料理がとても上手です。"], ["Wir bestellen am Wochenende oft Pizza.", "週末によくピザを注文します。"]],
      B1: [["Selbst gekochtes Essen ist gesünder als Fertiggerichte aus dem Supermarkt.", "自分で作る料理はスーパーの出来合いより健康的です。"], ["Wenn ich Zeit habe, bereite ich gerne komplizierte Gerichte zu.", "時間があるときは、複雑な料理を作るのが好きです。"], ["Frische Zutaten machen einen großen Unterschied beim Kochen.", "新鮮な材料は料理を大きく変えます。"], ["Mein Lieblingsgericht ist Ramen mit hausgemachter Brühe.", "私の好物は自家製スープのラーメンです。"], ["Bevor man kocht, sollte man immer den Arbeitsplatz aufräumen.", "料理する前に、いつも作業場を片付けるべきです。"], ["Wenn ich Gäste habe, koche ich gerne etwas Besonderes.", "お客さんが来るときは、特別なものを作りたいです。"], ["Mein Lieblingsessen ist Sushi, aber nur frisch zubereitet.", "私の好物は寿司ですが、新鮮なものに限ります。"], ["Die Würzung macht oft den ganzen Unterschied beim Kochen.", "味付けが料理全体に大きな違いを生みます。"], ["Ich versuche, weniger Fleisch und mehr Gemüse zu essen.", "肉を減らして、もっと野菜を食べるようにしています。"], ["Süßspeisen sollte man nur in Maßen genießen.", "甘いものは適度に楽しむべきです。"]],
      B2: [["Die japanische Küche zeichnet sich durch saisonale Zutaten und schlichte Zubereitung aus.", "日本料理は旬の食材と簡素な調理法が特徴です。"], ["Wer regelmäßig zuhause kocht, spart Geld und ernährt sich ausgewogener.", "家でよく料理する人はお金を節約でき、栄養バランスも良くなります。"], ["Trotz aller modernen Küchengeräte schmeckt traditionell zubereitetes Essen oft besser.", "現代的な調理器具があっても、伝統的な料理の方が美味しく感じることが多いです。"], ["Beim Essen geht es nicht nur um Nahrung, sondern auch um Gemeinschaft.", "食事は栄養だけでなく、人とのつながりも大切です。"], ["Die richtige Würzung entscheidet darüber, ob ein Gericht wirklich gelingt.", "適切な味付けで料理の成功が決まります。"], ["Wer einmal selbst Sushi gerollt hat, schätzt die Kunst dahinter umso mehr.", "自分で寿司を巻いたことのある人は、その背後にある技術をより評価します。"], ["Regionale Spezialitäten zu probieren, gehört für mich zu jeder Reise.", "地方の特産品を試すことは、旅の一部だと思います。"], ["Die Esskultur eines Landes verrät viel über seine Geschichte und Werte.", "国の食文化は、その歴史と価値観について多くを物語ります。"], ["Vegetarisch zu kochen erfordert mehr Kreativität, als viele Menschen glauben.", "菜食料理は多くの人が思うより創造性が必要です。"], ["Hochwertige Zutaten sind teurer, aber meistens jeden Cent wert.", "高品質な材料は高いですが、たいていそれだけの価値があります。"]],
      C1: [["Authentische japanische Küche zeichnet sich durch ihre Schlichtheit und Präzision aus.", "本格的な日本料理は、その質素さと正確さが特徴です。"], ["Die Komplexität eines guten Gerichts liegt oft in den scheinbar einfachsten Details.", "良い料理の複雑さは、一見最も単純に見える細部に潜んでいます。"], ["Wer kulinarisch experimentiert, muss bereit sein, Misserfolge zu akzeptieren.", "料理で実験する人は、失敗を受け入れる覚悟が必要です。"], ["Saisonale Zutaten zu verwenden ist nicht nur ökologisch, sondern auch geschmacklich überlegen.", "旬の食材を使うことは環境にも良く、味も優れています。"], ["Die japanische Esskultur betont die Harmonie zwischen Form, Farbe und Geschmack.", "日本の食文化は形、色、味の調和を大切にします。"]],
      C2: [["In der Gastronomie verschmelzen Handwerk und Kunst zu einer einzigartigen Ausdrucksform.", "料理の世界では、職人技と芸術が融合し、独特な表現となります。"], ["Was wir essen, sagt mehr über uns aus, als wir oft selbst zugeben wollen.", "私たちが食べるものは、自分でも認めたくないほど多くを物語ります。"], ["Die globale Verbreitung von Fast Food hat traditionelle Esskulturen zurückgedrängt.", "ファストフードの世界的な普及により、伝統的な食文化が衰退しつつあります。"], ["Wahre Genießer wissen, dass langsames Essen Lebenskunst ist.", "真の美食家は、ゆっくり食べることが生きる技術だと知っています。"], ["Die Beziehung zwischen Mensch und Nahrung ist seit jeher kulturell tief geprägt.", "人と食べ物の関係は、昔から文化的に深く形作られてきました。"]]
    }
  },

    levelQuiz: {
      A1: [["Der Hund schläft.", "犬が寝ています。"], ["Die Katze ist klein.", "猫は小さいです。"], ["Ich liebe Tiere.", "動物が好きです。"], ["Der Vogel singt.", "鳥が鳴きます。"], ["Wo ist der Fisch?", "魚はどこですか。"], ["Pferde sind groß.", "馬は大きいです。"], ["Ich habe einen Hund.", "犬がいます。"], ["Die Katze schläft.", "猫が寝ています。"], ["Vögel fliegen hoch.", "鳥は高く飛びます。"], ["Mäuse sind klein.", "ネズミは小さいです。"]],
      A2: [["Mein Hund spielt jeden Tag im Garten.", "私の犬は毎日庭で遊びます。"], ["Im Zoo habe ich viele Tiere gesehen.", "動物園でたくさんの動物を見ました。"], ["Katzen sind unabhängiger als Hunde.", "猫は犬より独立しています。"], ["Wir müssen wilde Tiere schützen.", "野生動物を守らなければなりません。"], ["Mein Bruder hat einen Hamster bekommen.", "兄はハムスターをもらいました。"], ["Mein kleiner Bruder hat Angst vor Spinnen.", "弟はクモを怖がります。"], ["Im Wald habe ich viele Eichhörnchen gesehen.", "森でリスをたくさん見ました。"], ["Pinguine leben im kalten Süden.", "ペンギンは寒い南に住んでいます。"], ["Mein Goldfisch heißt Bubbles und ist sehr alt.", "私の金魚はバブルスといって、とても年寄りです。"], ["Tiere sollen niemals schlecht behandelt werden.", "動物を決してひどく扱ってはいけません。"]],
      B1: [["Ich glaube, dass Tiere mehr fühlen, als wir denken.", "動物は私たちが思う以上に感じていると思います。"], ["Mein Hund versteht mich oft besser als manche Menschen.", "私の犬は時々人間より私のことをよく理解します。"], ["Wenn man ein Haustier hat, übernimmt man große Verantwortung.", "ペットを飼うと、大きな責任が生まれます。"], ["Katzen sind unabhängig, aber sie zeigen auch viel Zuneigung.", "猫は独立していますが、愛情もよく示します。"], ["Die meisten Haustiere brauchen tägliche Bewegung und Aufmerksamkeit.", "ほとんどのペットは毎日の運動と愛情が必要です。"], ["Mein Hund freut sich immer, wenn ich nach Hause komme.", "私の犬は私が帰ってくるといつも喜びます。"], ["Manche Vogelarten können erstaunliche Strecken zurücklegen.", "渡り鳥の中には、驚くほど長距離を移動する種もいます。"], ["Streichelzoos sind besonders bei Kindern sehr beliebt.", "子供たちには、ふれあい動物園が特に人気です。"], ["Ich hätte gerne ein Pferd, aber dafür fehlt mir der Platz.", "馬を飼いたいですが、場所がありません。"], ["Wer einmal einen Hund hatte, möchte selten ohne sein.", "犬を飼ったことのある人は、なかなか手放したくないものです。"]],
      B2: [["Wildtiere zu beobachten ist ein unvergleichliches Erlebnis in der freien Natur.", "自然の中で野生動物を観察することは比べようのない体験です。"], ["Der Schutz bedrohter Arten erfordert internationale Zusammenarbeit und langfristige Strategien.", "絶滅危惧種の保護には国際協力と長期的な戦略が必要です。"], ["Hunde, die früh sozialisiert werden, sind als Erwachsene meist ausgeglichener.", "早く社会化された犬は、大人になってから安定する傾向があります。"], ["Manche Forscher behaupten, Krähen seien intelligenter als kleine Kinder.", "カラスは幼児より知能が高いと主張する研究者もいます。"], ["Die Bindung zwischen Mensch und Tier kann emotional außerordentlich tief werden.", "人と動物の絆は感情的に非常に深くなることがあります。"], ["Die meisten Hauskatzen behalten zeitlebens kindliche Verhaltensweisen bei.", "ほとんどの飼い猫は、生涯にわたって子供のような行動を示します。"], ["Manche Tiere bilden überraschend komplexe soziale Strukturen aus.", "一部の動物は、驚くほど複雑な社会構造を作ります。"], ["Hunde, die ausreichend gefordert werden, sind meist auch zufriedener.", "十分に運動する犬は、たいていより満足しています。"], ["In Japan haben Katzen einen besonderen kulturellen Stellenwert.", "日本では、猫は特別な文化的地位を持っています。"], ["Der Verlust eines geliebten Tieres kann fast so schmerzhaft sein wie der eines Menschen.", "愛する動物を失うことは、人を失うのとほぼ同じくらい辛いです。"]],
      C1: [["Wer das Verhalten wilder Tiere beobachtet, lernt viel über die Vielfalt der Natur.", "野生動物の行動を観察すると、自然の多様性について多くを学べます。"], ["Die Domestizierung von Hunden begann bereits vor mehreren Zehntausend Jahren.", "犬の家畜化は何万年も前に始まりました。"], ["Manche Tierarten sind in den letzten Jahrzehnten praktisch ausgestorben.", "一部の動物種は、ここ数十年でほぼ絶滅してしまいました。"], ["Die Intelligenz mancher Vogelarten überrascht selbst erfahrene Forscher.", "一部の鳥類の知能は、経験豊富な研究者すら驚かせます。"], ["Tierschutz sollte ein zentrales Anliegen jeder modernen Gesellschaft sein.", "動物保護は、現代社会において重要な課題であるべきです。"]],
      C2: [["Die ethische Frage nach unserem Umgang mit Tieren verschärft sich in einer industrialisierten Welt.", "産業化された世界では、動物との関わりの倫理的問題がますます深刻になります。"], ["Empathie für andere Lebewesen definiert unsere Menschlichkeit möglicherweise am tiefsten.", "他の生き物への共感こそが、人間性を最も深く定義するものかもしれません。"], ["Manche Forscher vermuten, dass auch Pflanzen rudimentäre Wahrnehmung besitzen.", "一部の研究者は、植物にも初歩的な知覚があると推測しています。"], ["Die Zerstörung natürlicher Lebensräume bedroht weltweit die Artenvielfalt.", "自然生息地の破壊は、世界中の生物多様性を脅かしています。"], ["Tiere besitzen oft eine Sensibilität, die uns Menschen in vielerlei Hinsicht fehlt.", "動物には、人間に欠けている繊細さが多くあります。"]]
    }
  },

      B1: [["Wenn die Sonne scheint, gehe ich am liebsten im Wald spazieren.", "太陽が出ているときは、森を散歩するのが一番好きです。"], ["Das Wetter in Wien ist im Frühling oft sehr wechselhaft.", "ウィーンの春の天気はよく変わります。"], ["Ich liebe es, im Herbst die bunten Blätter zu fotografieren.", "秋に色とりどりの葉を撮るのが大好きです。"], ["Wenn ein Gewitter kommt, bleibe ich lieber zuhause.", "雷雨が来るときは、家にいる方がいいです。"], ["Schnee im Winter macht die Stadt viel schöner.", "冬の雪は街をずっと美しくします。"], ["Wenn die Sonne untergeht, wird der Himmel ganz orange.", "太陽が沈むと、空はオレンジ色になります。"], ["Ich liebe es, im Wald spazieren zu gehen, besonders im Herbst.", "森を散歩するのが好きで、特に秋が好きです。"], ["Das Wetter hat in den letzten Jahren spürbar geändert.", "天気はここ数年で目に見えて変わりました。"], ["Ein Spaziergang im Schnee hat etwas Magisches an sich.", "雪の中の散歩には何か魔法のようなものがあります。"], ["Naturgeräusche helfen mir, mich zu entspannen.", "自然の音は私をリラックスさせてくれます。"]],
      B2: [["Der Klimawandel verändert die jahreszeitlichen Muster auf der ganzen Welt drastisch.", "気候変動は世界中の季節パターンを大きく変えています。"], ["Wer einmal einen Sonnenuntergang in den Alpen erlebt hat, vergisst ihn nie.", "アルプスの夕日を一度見た人は、それを決して忘れません。"], ["Naturschutzgebiete sind essenziell, um die biologische Vielfalt zu erhalten.", "自然保護区は生物多様性を守るために不可欠です。"], ["Extreme Wetterereignisse werden in den nächsten Jahrzehnten voraussichtlich zunehmen.", "異常気象は今後数十年でますます増えると予測されています。"], ["Die Kirschblüten in Japan ziehen jedes Frühjahr Millionen Besucher an.", "日本の桜は毎春、何百万人もの観光客を引きつけます。"], ["Die Klimaerwärmung wird in den kommenden Jahren noch spürbarer werden.", "気候温暖化は、今後の数年でさらに目に見えるものになるでしょう。"], ["In Japan werden Erdbeben durch ein modernes Frühwarnsystem rechtzeitig erkannt.", "日本では地震が現代的な早期警報システムで早く検知されます。"], ["Eine Wanderung durch alpines Gelände erfordert gute Vorbereitung.", "アルプスでのハイキングには十分な準備が必要です。"], ["Naturschutzgebiete sind unverzichtbar für den Erhalt seltener Arten.", "自然保護区は希少種の保護に欠かせません。"], ["Wer einmal das Polarlicht gesehen hat, vergisst dieses Schauspiel nie wieder.", "オーロラを一度見た人は、その光景を決して忘れません。"]],
      C1: [["Der Klimawandel hat das Wettergeschehen weltweit nachhaltig verändert.", "気候変動は世界中の気象に持続的な変化をもたらしました。"], ["Wer einmal einen Sonnenuntergang über dem Meer erlebt hat, vergisst ihn nie.", "海に沈む夕日を一度見た人は、それを決して忘れません。"], ["Die Schönheit der japanischen Berglandschaft ist legendär.", "日本の山岳風景の美しさは伝説的です。"], ["Naturphänomene können sowohl beeindruckend als auch erschreckend zugleich sein.", "自然現象は印象的でもあり、同時に恐ろしくもあります。"], ["Der Schutz natürlicher Ressourcen wird zur zentralen Aufgabe unseres Jahrhunderts.", "自然資源の保護は、今世紀の中心的課題となっています。"]],
      C2: [["Die unbarmherzige Schönheit der Natur lehrt uns Demut wie kaum etwas anderes.", "自然の容赦ない美しさほど、私たちに謙虚さを教えてくれるものはありません。"], ["Extreme Wetterereignisse, einst Ausnahmen, drohen zur neuen Normalität zu werden.", "かつては例外だった異常気象が、新たな常態となる恐れがあります。"], ["Wer die Natur respektiert, schützt damit letztlich auch sich selbst.", "自然を尊重する者は、結果として自分自身も守っています。"], ["Die Symbiose zwischen Zivilisation und ökologischen Systemen ist außerordentlich fragil.", "文明と生態系の共生関係は非常に脆いものです。"], ["In einer urbanisierten Welt verlieren viele den Bezug zur natürlichen Umgebung.", "都市化した世界では、多くの人が自然環境とのつながりを失っています。"]]

    levelQuiz: {
      A1: [["Meine Mutter ist nett.", "母は優しいです。"], ["Ich habe einen Bruder.", "兄がいます。"], ["Wir sind Freunde.", "私たちは友達です。"], ["Ich liebe meine Familie.", "家族を愛しています。"], ["Wo wohnt deine Schwester?", "妹はどこに住んでいますか。"], ["Ich habe einen Vater.", "父がいます。"], ["Meine Schwester ist nett.", "妹は優しいです。"], ["Wir essen zusammen.", "一緒に食べます。"], ["Ich rufe meinen Freund an.", "友達に電話します。"], ["Wir spielen im Park.", "公園で遊びます。"]],
      A2: [["Meine Eltern wohnen in Wien.", "両親はウィーンに住んでいます。"], ["Letzten Sommer habe ich meinen besten Freund besucht.", "去年の夏、親友を訪ねました。"], ["Familie ist mir wichtiger als alles andere.", "家族は何より大切です。"], ["Wir treffen uns jeden Sonntag bei meinen Großeltern.", "毎週日曜日に祖父母の家で集まります。"], ["Mein Vater ist Lehrer und meine Mutter ist Ärztin.", "父は教師で、母は医者です。"], ["Meine Großmutter erzählt gerne alte Geschichten.", "祖母は昔話をよくしてくれます。"], ["Wir treffen uns oft zum Kaffee bei meiner Tante.", "おばさんの家でよくコーヒーを飲みます。"], ["Mein Bruder studiert in einer anderen Stadt.", "弟は別の街で勉強しています。"], ["Letztes Wochenende haben wir Geburtstag gefeiert.", "先週末、誕生日を祝いました。"], ["Freunde sind manchmal wichtiger als Familie.", "時には友達が家族より大切です。"]],
      B1: [["Meine Familie bedeutet mir mehr als alles andere auf der Welt.", "家族は世界で何より大切です。"], ["Wir treffen uns einmal im Monat zum gemeinsamen Abendessen.", "月に一度、皆で集まって夕食を食べます。"], ["Echte Freundschaft entsteht über viele Jahre hinweg.", "本当の友情は長い年月をかけて生まれます。"], ["Wenn ich Probleme habe, rufe ich immer meine Mutter an.", "困ったときは、いつも母に電話します。"], ["Mein bester Freund kennt mich besser als ich selbst.", "親友は私自身よりも私のことをよく知っています。"], ["Es ist nicht immer leicht, mit der eigenen Familie auszukommen.", "自分の家族と上手くやっていくのはいつも簡単ではありません。"], ["Ohne meine besten Freunde wäre mein Leben deutlich ärmer.", "親友がいなければ、私の人生はずっと寂しいものになるでしょう。"], ["Manche Freundschaften halten länger als manche Familienbande.", "家族の絆より長く続く友情もあります。"], ["Verwandtschaftliche Beziehungen sind komplex und vielschichtig.", "親族関係は複雑で多層的です。"], ["Wir verbringen das Weihnachtsfest immer mit der ganzen Familie.", "クリスマスはいつも家族全員で過ごします。"]],

  6: [["Mein Chef gibt mir oft neue und interessante Aufgaben.", "上司はよく新しくて面白い仕事を任せてくれます。"], ["In der Pause unterhalte ich mich gerne mit meinen Kollegen.", "休憩時間に同僚と話すのが好きです。"], ["Wenn ich konzentriert arbeite, vergeht die Zeit wie im Flug.", "集中して働くと、時間があっという間に過ぎます。"], ["Mein Studium hat mich auf vieles im Berufsleben vorbereitet.", "大学での勉強は仕事の多くの面で役立っています。"], ["Eine gute Ausbildung ist die Grundlage für späteren Erfolg.", "良い教育は後の成功の基盤です。"], ["Im modernen Berufsleben sind Soft Skills oft genauso wichtig wie Fachwissen.", "現代の職業生活では、ソフトスキルが専門知識と同じくらい重要です。"], ["Wer in seinem Beruf erfolgreich sein will, muss kontinuierlich lernen.", "仕事で成功したい人は、絶え間なく学び続ける必要があります。"], ["Die Digitalisierung verändert nicht nur die Berufe selbst, sondern auch unser Verständnis von Arbeit.", "デジタル化は職業自体だけでなく、仕事に対する私たちの理解も変えています。"], ["Eine gute Work-Life-Balance erfordert klare Grenzen zwischen Arbeit und Freizeit.", "良いワークライフバランスには、仕事と休暇の明確な境界が必要です。"], ["Die Bildung sollte nicht nur Fachwissen vermitteln, sondern auch die Persönlichkeit formen.", "教育は専門知識を伝えるだけでなく、人格を形成すべきです。"]],

  8: [["Ich gehe einmal im Jahr zur Routineuntersuchung.", "年に一度、健康診断を受けています。"], ["Wenn ich müde bin, mache ich gerne eine kurze Pause.", "疲れたら、短い休憩を取るのが好きです。"], ["Ausreichend Schlaf ist genauso wichtig wie gesunde Ernährung.", "十分な睡眠は健康的な食事と同じくらい大切です。"], ["Bei Rückenschmerzen hilft mir Yoga am besten.", "背中の痛みにはヨガが一番効きます。"], ["Stress hat einen großen Einfluss auf unsere körperliche Gesundheit.", "ストレスは身体の健康に大きな影響を与えます。"], ["Eine ausgewogene Ernährung sollte täglich Obst und Gemüse enthalten.", "バランスの取れた食事には、毎日果物と野菜が必要です。"], ["Wer regelmäßig Sport treibt, lebt nachweislich länger.", "定期的に運動する人は、確実に長生きすることが証明されています。"], ["Die mentale Gesundheit wird in unserer Gesellschaft immer noch zu wenig beachtet.", "精神的な健康は、私たちの社会でまだ十分に注目されていません。"], ["Präventive Medizin ist langfristig effektiver als jede Behandlung.", "予防医学は長期的に、どんな治療よりも効果的です。"], ["Wahre Gesundheit umfasst körperliches, mentales und soziales Wohlbefinden in gleichem Maße.", "真の健康とは、肉体的、精神的、社会的な健康を同じように含むものです。"]],

  10: [["Manchmal brauche ich einfach Zeit für mich allein.", "時々、ただ一人の時間が必要です。"], ["Wenn ich gestresst bin, hilft mir Musik beim Entspannen.", "ストレスを感じるとき、音楽が落ち着くのに役立ちます。"], ["Es ist normal, sich manchmal überfordert zu fühlen.", "時々圧倒されると感じるのは普通のことです。"], ["Ich versuche, jeden Tag etwas Positives zu sehen.", "毎日何か前向きなことを見るようにしています。"], ["Über meine Gefühle zu sprechen, fällt mir nicht immer leicht.", "自分の感情について話すことは、いつも簡単ではありません。"], ["Emotionale Intelligenz ist heute wichtiger denn je.", "感情的知性は今、これまで以上に重要です。"], ["Wer seine Gefühle versteht, kann andere besser verstehen.", "自分の感情を理解する人は、他人をよりよく理解できます。"], ["Tiefe Freude entsteht oft aus den einfachsten Momenten des Alltags.", "深い喜びは、しばしば日常の最も単純な瞬間から生まれます。"], ["Die Akzeptanz schwieriger Gefühle ist der erste Schritt zur Heilung.", "困難な感情を受け入れることは、癒しへの第一歩です。"], ["Wahre Selbsterkenntnis erfordert Mut, ehrlich auf die eigenen Schatten zu schauen.", "真の自己認識には、自分の影と正直に向き合う勇気が必要です。"]]
};
function App() {
  const [screen, setScreen] = useState("menu");
  const [tIdx, setTIdx] = useState(0);
  const [sIdx, setSIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [isPlaying, setIsPlaying] = useState(false);
  const [speed, setSpeed] = useState(1);
  const [aMode, setAMode] = useState("both"); // de | ja | both
  const [pauseSec, setPauseSec] = useState(1);
  const [repeatMode, setRepeatMode] = useState(false);
  const [loopMode, setLoopMode] = useState(false);
  const [showFurigana, setShowFurigana] = useState(false);
  // Progress tracking (real): seen sentences per topic, daily streak, today's goal
  const [seenMap, setSeenMap] = useState({}); // { tIdx: [sIdx,...] }
  const [dayStreak, setDayStreak] = useState(0);
  const [lastStudyDate, setLastStudyDate] = useState("");
  const [todayCount, setTodayCount] = useState(0);
  const [todayDate, setTodayDate] = useState("");
  const [dailyGoal, setDailyGoal] = useState(20);
  const [lastPos, setLastPos] = useState(0); // last sentence index in last topic
  const [navTab, setNavTab] = useState("learn"); // learn | verbs | quiz | more (bottom nav)
  const [pickerFor, setPickerFor] = useState(null); // "verbs" | "quiz" when choosing a topic

  // Level system (A1-C2)
  const [selectedLevel, setSelectedLevel] = useState(null);
  const [levelScores, setLevelScores] = useState({});
  const [levelSentences, setLevelSentences] = useState({});
  const [levelGen, setLevelGen] = useState(false);
  const [levelGenStatus, setLevelGenStatus] = useState("");
  const [quizSents, setQuizSents] = useState(null);
  const [quizLevel, setQuizLevel] = useState(null);
  const [quizDir, setQuizDir] = useState("deToJa");
  const [quizOrder, setQuizOrder] = useState([]);
  const [quizPos, setQuizPos] = useState(0);
  const [opts, setOpts] = useState([]);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState({
    c: 0,
    t: 0
  });
  const [streak, setStreak] = useState(0);
  const [best, setBest] = useState(0);
  const [animKey, setAnimKey] = useState(0);
  const [darkMode, setDarkMode] = useState(true);
  const [showQuickNav, setShowQuickNav] = useState(false);
  const [deVoices, setDeVoices] = useState([]);
  const [jaVoices, setJaVoices] = useState([]);
  const [deVoiceIdx, setDeVoiceIdx] = useState(0);
  const [jaVoiceIdx, setJaVoiceIdx] = useState(0);
  const [showVoices, setShowVoices] = useState(false);
  const [pitch, setPitch] = useState(1);
  const playRef = useRef(false);
  const speedRef = useRef(1);
  const pitchRef = useRef(1);
  const aModeRef = useRef("both");
  const pauseSecRef = useRef(1);
  const repeatModeRef = useRef(false);
  const loopModeRef = useRef(false);
  const tIdxRef = useRef(0);
  const deVoiceRef = useRef(null);
  const jaVoiceRef = useRef(null);

  // rank voices: Google neural > non-local (network) > local — Google DE in Chrome sounds great
  const rankVoice = v => {
    if (v.name.toLowerCase().includes("google")) return 0;
    if (!v.localService) return 1;
    if (v.name.toLowerCase().includes("neural") || v.name.toLowerCase().includes("premium")) return 2;
    return 3;
  };
  useEffect(() => {
    const load = () => {
      const all = speechSynthesis.getVoices();
      const de = all.filter(v => v.lang.startsWith("de")).sort((a, b) => rankVoice(a) - rankVoice(b));
      const ja = all.filter(v => v.lang.startsWith("ja")).sort((a, b) => rankVoice(a) - rankVoice(b));
      setDeVoices(de);
      setJaVoices(ja);
      if (de.length) deVoiceRef.current = de[0];
      if (ja.length) jaVoiceRef.current = ja[0];
    };
    load();
    speechSynthesis.addEventListener("voiceschanged", load);
    return () => speechSynthesis.removeEventListener("voiceschanged", load);
  }, []);

  // Dark mode: load preference and apply CSS variables
  useEffect(() => {
    (async () => {
      try {
        const s = await window.storage.get("settings:dark");
        if (s && s.value === "true") setDarkMode(true);
      } catch (e) {}
    })();
  }, []);
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty("--r-sm", "12px");
    r.style.setProperty("--r-md", "16px");
    r.style.setProperty("--r-lg", "22px");
    r.style.setProperty("--r-full", "100px");
    r.style.setProperty("--accent", "#818cf8");
    r.style.setProperty("--accent-bright", "#a5b4fc");
    if (darkMode) {
      r.style.setProperty("--bg", "#090c12");
      r.style.setProperty("--card", "rgba(255,255,255,0.05)");
      r.style.setProperty("--card-alt", "rgba(255,255,255,0.03)");
      r.style.setProperty("--text", "#eef1f6");
      r.style.setProperty("--text-sub", "rgba(238,241,246,0.56)");
      r.style.setProperty("--text-faint", "rgba(238,241,246,0.32)");
      r.style.setProperty("--border", "rgba(255,255,255,0.09)");
      r.style.setProperty("--border-bright", "rgba(255,255,255,0.15)");
      r.style.setProperty("--subtle", "rgba(255,255,255,0.06)");
      r.style.setProperty("--accent-soft", "rgba(129,140,248,0.16)");
      r.style.setProperty("--shadow", "0 1px 0 rgba(255,255,255,.05) inset, 0 10px 26px rgba(0,0,0,.4)");
      r.style.setProperty("--shadow-lg", "0 1px 0 rgba(255,255,255,.06) inset, 0 16px 40px rgba(0,0,0,.5)");
      document.body.style.backgroundColor = "#090c12";
      document.body.style.backgroundImage = "radial-gradient(1000px circle at 50% -15%, rgba(129,140,248,0.20), transparent 55%)," + "radial-gradient(700px circle at 88% 8%, rgba(34,211,238,0.09), transparent 50%)," + "radial-gradient(800px circle at 10% 40%, rgba(168,85,247,0.07), transparent 55%)";
      document.body.style.backgroundAttachment = "fixed";
    } else {
      r.style.setProperty("--bg", "#f6f7f9");
      r.style.setProperty("--card", "#ffffff");
      r.style.setProperty("--card-alt", "#fbfcfd");
      r.style.setProperty("--text", "#141b2e");
      r.style.setProperty("--text-sub", "#5f6b80");
      r.style.setProperty("--text-faint", "#9aa4b6");
      r.style.setProperty("--border", "#e7eaf0");
      r.style.setProperty("--border-bright", "#dfe3ea");
      r.style.setProperty("--subtle", "#f2f4f7");
      r.style.setProperty("--accent-soft", "rgba(129,140,248,0.12)");
      r.style.setProperty("--shadow", "0 1px 2px #1b253015, 0 4px 16px #1b253012");
      r.style.setProperty("--shadow-lg", "0 2px 8px #1b25301a, 0 16px 36px #1b253018");
      document.body.style.backgroundColor = "#f6f7f9";
      document.body.style.backgroundImage = "none";
    }
    document.body.style.color = "var(--text)";
  }, [darkMode]);
  const toggleDark = async () => {
    const next = !darkMode;
    setDarkMode(next);
    try {
      await window.storage.set("settings:dark", String(next));
    } catch (e) {}
  };

  // ── Kanji / grammar analysis via Claude API ─────────────
  const hashStr = s => {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
    return Math.abs(h).toString(36);
  };
  const [analysis, setAnalysis] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [analyzeErr, setAnalyzeErr] = useState(null);
  const analysisCache = useRef(new Map());
  useEffect(() => {
    setAnalysis(null);
    setAnalyzeErr(null);
  }, [sIdx, tIdx]);
  const analyzeJa = async (deSent, jaSent) => {
    // 1. In-memory cache (instant)
    if (analysisCache.current.has(jaSent)) {
      setAnalysis(analysisCache.current.get(jaSent));
      return;
    }
    // 2. Persistent cache (hashed key, safe for all chars)
    const cacheKey = "an:" + hashStr(jaSent);
    try {
      const stored = await window.storage.get(cacheKey);
      if (stored) {
        const p = JSON.parse(stored.value);
        analysisCache.current.set(jaSent, p);
        setAnalysis(p);
        return;
      }
    } catch (e) {/* not cached */}
    setAnalyzing(true);
    setAnalyzeErr(null);
    try {
      const r = await _llm_({
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1200,
          messages: [{
            role: "user",
            content: `Analyze this Japanese sentence. Return ONLY a JSON object, no preamble, no markdown.

Japanese: ${jaSent}
German: ${deSent}

JSON structure:
{"tokens":[{"jp":"私","reading":"わたし","de":"ich","type":"Pronomen"}],"grammar":"Kurze Erklärung der Satzstruktur auf Deutsch","note":"Besonderheit/kultureller Hinweis oder leer"}

Rules:
- tokens: jedes japanische Wort/Partikel in der Reihenfolge des Satzes
- jp: das Original wie geschrieben (Kanji/Hiragana/Katakana)
- reading: Hiragana-Lesung (bei reinem Hiragana = gleich wie jp; Katakana bleibt Katakana)
- de: kurze deutsche Bedeutung
- type: Wortart auf Deutsch (Nomen, Verb, Partikel, Adjektiv, i-Adjektiv, na-Adjektiv, Adverb, Pronomen, Hilfsverb, Konjunktion, Suffix)
- grammar: 1-2 Sätze auf Deutsch zur Struktur
- note: nur bei kultureller/idiomatischer Besonderheit, sonst ""`
          }]
        })
      });

      // Check HTTP status before parsing
      if (!r.ok) {
        const errBody = await r.json().catch(() => ({}));
        const errType = errBody?.error?.type || "";
        const msg = errBody?.error?.message;
        if (r.status === 429 || errType.includes("rate_limit")) {
          setAnalyzeErr("⏳ " + (msg || "Rate Limit — bitte 1-2 Minuten warten und nochmal versuchen."));
        } else if (r.status === 503 || errType.includes("network")) {
          setAnalyzeErr("🌐 " + (msg || "Verbindung fehlgeschlagen") + " — In der Claude.ai-Vorschau ist Gemini blockiert; auf der echten Seite (GitHub) testen.");
        } else if (msg) {
          setAnalyzeErr("⚠️ " + msg);
        } else if (r.status >= 500) {
          setAnalyzeErr("🔧 Server-Problem — kurz warten und nochmal versuchen.");
        } else {
          setAnalyzeErr(`API-Fehler ${r.status}`);
        }
        setAnalyzing(false);
        return;
      }
      const d = await r.json();
      if (!d.content) {
        setAnalyzeErr("Unerwartete API-Antwort — bitte nochmal versuchen.");
        setAnalyzing(false);
        return;
      }
      const textBlock = d.content.find(c => c.type === "text");
      if (!textBlock) {
        setAnalyzeErr("Keine Textantwort von API — bitte nochmal versuchen.");
        setAnalyzing(false);
        return;
      }
      const clean = textBlock.text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      analysisCache.current.set(jaSent, parsed);
      try {
        await window.storage.set(cacheKey, JSON.stringify(parsed));
      } catch (e) {}
      setAnalysis(parsed);

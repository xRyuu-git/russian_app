function normRu(s) {
  return stripStress(s || "").toLowerCase()
    .replace(/ё/g, "е")
    .replace(/[.,!?;:()«»"„""\u2014\-]/g, " ")
    .replace(/\s+/g, " ").trim();
}

  const audioCtx = useRef(null);
  const master = useRef(null);
  const noiseBuf = useRef(null);
  const getCtx = () => {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    if (!audioCtx.current) {
      audioCtx.current = new AC();
      master.current = audioCtx.current.createGain();
      master.current.gain.value = 0.34; // Gesamtlautstärke der Klicks
      master.current.connect(audioCtx.current.destination);
    }
    const ac = audioCtx.current;
    if (ac.state === "suspended") ac.resume();
    return ac;
  };
  const out = () => master.current || (audioCtx.current && audioCtx.current.destination);
  const getNoise = (ac) => {
    if (!noiseBuf.current) {
      const b = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.05), ac.sampleRate);
      const d = b.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

    return noiseBuf.current;
  };
  // a satisfying mechanical mouse-click: sharp noise transient + short low body
  const clickMech = (ac, hpFreq, bodyFreq, vol) => {
    const t = ac.currentTime;
    const src = ac.createBufferSource(); src.buffer = getNoise(ac);
    const hp = ac.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = hpFreq;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.55 * vol, t + 0.001);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.028);
    src.connect(hp); hp.connect(g); g.connect(out());
    src.start(t); src.stop(t + 0.05);
    const o = ac.createOscillator(); o.type = "sine";
    o.frequency.setValueAtTime(bodyFreq, t);
    o.frequency.exponentialRampToValueAtTime(bodyFreq * 0.5, t + 0.03);
    const g2 = ac.createGain();
    g2.gain.setValueAtTime(0.0001, t);
    g2.gain.exponentialRampToValueAtTime(0.22 * vol, t + 0.002);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.045);
    o.connect(g2); g2.connect(out()); o.start(t); o.stop(t + 0.06);
  };
  const tone = (ac, type, f0, f1, peak, dur) => {
    const t = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(f1, t + dur * 0.8);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(peak, t + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(out()); o.start(t); o.stop(t + dur + 0.01);
  };
  const playSound = (kindOverride) => {
    if (!soundOnRef.current && !kindOverride) return;
    try {
      const ac = getCtx(); if (!ac) return;
      const k = kindOverride || soundKindRef.current;
      if (k === "click") clickMech(ac, 1800, 170, 1);
      else if (k === "tock") clickMech(ac, 900, 110, 0.95);
      else if (k === "pop") tone(ac, "sine", 760, 300, 0.16, 0.07);
      else tone(ac, "triangle", 520, 340, 0.1, 0.09); // blip
    } catch (e) {}
  };
  const playClick = () => playSound();
  useEffect(() => {
    const handler = (e) => { if (e.target && e.target.closest && e.target.closest("button")) playClick(); };
    document.addEventListener("click", handler, true);
    return () => document.removeEventListener("click", handler, true);
  }, []);
  useEffect(() => { speedRef.current = speed; }, [speed]);

  /* ── Theme tokens ──────────────────────────────────────── */
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty("--r-sm","12px"); r.style.setProperty("--r-md","16px");
    r.style.setProperty("--r-lg","22px"); r.style.setProperty("--r-full","100px");
    r.style.setProperty("--accent","#818cf8"); r.style.setProperty("--accent-bright","#a5b4fc");
    if (dark) {
      r.style.setProperty("--bg","#090c12");
      r.style.setProperty("--card","rgba(255,255,255,0.05)");
      r.style.setProperty("--card-alt","rgba(255,255,255,0.03)");
      r.style.setProperty("--text","#eef1f6");
      r.style.setProperty("--text-sub","rgba(238,241,246,0.56)");
      r.style.setProperty("--text-faint","rgba(238,241,246,0.32)");
      r.style.setProperty("--border","rgba(255,255,255,0.09)");
      r.style.setProperty("--border-bright","rgba(255,255,255,0.15)");
      r.style.setProperty("--accent-soft","rgba(129,140,248,0.16)");
      r.style.setProperty("--shadow","0 1px 0 rgba(255,255,255,.05) inset, 0 10px 26px rgba(0,0,0,.4)");
      document.body.style.backgroundColor = "#090c12";
      document.body.style.backgroundImage =
        "radial-gradient(1000px circle at 50% -15%, rgba(129,140,248,0.20), transparent 55%),"+
        "radial-gradient(700px circle at 88% 8%, rgba(34,211,238,0.09), transparent 50%),"+
        "radial-gradient(800px circle at 10% 40%, rgba(168,85,247,0.07), transparent 55%)";
      document.body.style.backgroundAttachment = "fixed";
    } else {
      r.style.setProperty("--bg","#f6f7f9");
      r.style.setProperty("--card","#ffffff");
      r.style.setProperty("--card-alt","#fbfcfd");
      r.style.setProperty("--text","#141b2e");
      r.style.setProperty("--text-sub","#5f6b80");
      r.style.setProperty("--text-faint","#9aa4b6");
      r.style.setProperty("--border","#e7eaf0");
      r.style.setProperty("--border-bright","#dfe3ea");
      r.style.setProperty("--accent-soft","rgba(129,140,248,0.12)");
      r.style.setProperty("--shadow","0 1px 2px #1b253015, 0 4px 16px #1b253012");
      document.body.style.backgroundColor = "#f6f7f9";
      document.body.style.backgroundImage = "none";
    }
    document.body.style.color = "var(--text)";
  }, [dark]);

  /* ── Voices ────────────────────────────────────────────── */
  const refreshVoices = () => {
    const synth = window.speechSynthesis;
    if (!synth) { setNoRuVoice(true); return []; }
    const all = synth.getVoices() || [];
    const rank = v => v.name.toLowerCase().includes("google") ? 0 : (!v.localService ? 1 : 3);
    const ru = all.filter(v => /^ru/i.test(v.lang)).sort((a,b)=>rank(a)-rank(b));
    const de = all.filter(v => /^de/i.test(v.lang)).sort((a,b)=>rank(a)-rank(b));
    if (ru.length) ruVoice.current = ru[0];
    if (de.length) deVoice.current = de[0];
    if (all.length) setNoRuVoice(ru.length === 0);
    return all;
  };
  useEffect(() => {
    refreshVoices();
    // some engines populate voices a moment later
    const t = setTimeout(refreshVoices, 400);
    if (window.speechSynthesis) speechSynthesis.addEventListener("voiceschanged", refreshVoices);
    return () => { clearTimeout(t); if (window.speechSynthesis) speechSynthesis.removeEventListener("voiceschanged", refreshVoices); };
  }, []);

  const speak = (text, lang) => {
    try {
      const synth = window.speechSynthesis;
      if (!synth) return;
      if (!ruVoice.current || !deVoice.current) refreshVoices();
      synth.cancel();
      const u = new SpeechSynthesisUtterance(stripStress(text));
      u.lang = lang === "ru" ? "ru-RU" : "de-DE";
      u.rate = lang === "ru" ? speedRef.current : 1;
      const v = lang === "ru" ? ruVoice.current : deVoice.current;
      if (v) u.voice = v;
      // Chrome bug: cancel() can swallow an immediately-following speak()
      setTimeout(() => { try { synth.resume(); synth.speak(u); } catch(e){} }, 60);
    } catch(e){}
  };

  // speak several items in order, call onDone after the last; returns a cancel fn
  const speakSeq = (items, onDone) => {
    const synth = window.speechSynthesis;
    if (!synth) { onDone && onDone(); return () => {}; }
    if (!ruVoice.current || !deVoice.current) refreshVoices();
    let i = 0, cancelled = false;
    const next = () => {
      if (cancelled) return;
      if (i >= items.length) { onDone && onDone(); return; }
      const it = items[i++];
      try {
        const u = new SpeechSynthesisUtterance(stripStress(it.text));
        u.lang = it.lang === "ru" ? "ru-RU" : "de-DE";
        u.rate = it.lang === "ru" ? speedRef.current : 1;
        const v = it.lang === "ru" ? ruVoice.current : deVoice.current;
        if (v) u.voice = v;
        u.onend = () => { if (!cancelled) next(); };
        u.onerror = () => { if (!cancelled) next(); };
        synth.speak(u);
      } catch(e) { if (!cancelled) next(); }
    };
    try { synth.cancel(); } catch(e){}
    setTimeout(() => { if (!cancelled) { try { synth.resume(); } catch(e){} next(); } }, 60);
    return () => { cancelled = true; try { synth.cancel(); } catch(e){} };
  };

  /* ── Load / save progress ──────────────────────────────── */
  useEffect(() => {
    (async () => {
      try { const s = await window.storage.get("settings:dark"); if (s) setDark(s.value === "true"); } catch(e){}
      try { const s = await window.storage.get("settings:stress"); if (s) setShowStress(s.value !== "false"); } catch(e){}
      try { const s = await window.storage.get("settings:sound"); if (s) { const on = s.value !== "false"; setSoundOn(on); soundOnRef.current = on; } } catch(e){}
      try { const s = await window.storage.get("settings:soundkind"); if (s && s.value) { setSoundKind(s.value); soundKindRef.current = s.value; } } catch(e){}
      try { const s = await window.storage.get("prog:seen"); if (s) setSeen(JSON.parse(s.value)); } catch(e){}
      try { const s = await window.storage.get("prog:streak"); if (s) setStreak(+s.value||0); } catch(e){}
      try { const s = await window.storage.get("prog:lastDate"); if (s) setLastDate(s.value); } catch(e){}
      try { const s = await window.storage.get("prog:today"); if (s){ const o=JSON.parse(s.value); setTodayDate(o.d); setTodayCount(o.c); } } catch(e){}
      try { const s = await window.storage.get("prog:levels"); if (s) setLevelsPassed(JSON.parse(s.value)); } catch(e){}
      try { const s = await window.storage.get("settings:newsver"); setNewsSeen(s && s.value ? s.value : "0"); } catch(e){ setNewsSeen("0"); }
    })();
  }, []);
  const markNewsSeen = () => { setNewsSeen(NEWS_VERSION); window.storage.set("settings:newsver", NEWS_VERSION).catch(()=>{}); };
  const newsUnseen = newsSeen !== NEWS_VERSION;
  const markLevelPassed = (L) => setLevelsPassed(prev => { const n = { ...prev, [L]: true }; window.storage.set("prog:levels", JSON.stringify(n)).catch(()=>{}); return n; });
  const reachedLevel = (() => { let r="—"; for (const L of LEVELS_ORDER){ if (levelsPassed[L]) r=L; else break; } return r; })();
  const today = () => new Date().toISOString().slice(0,10);
  const markSeen = (t, s) => {
    setSeen(prev => {
      const arr = prev[t] ? [...prev[t]] : [];
      if (!arr.includes(s)) arr.push(s);
      const next = { ...prev, [t]: arr };
      window.storage.set("prog:seen", JSON.stringify(next)).catch(()=>{});
      return next;
    });
    const d = today();
    setTodayDate(td => {
      let c = (td === d ? todayCount : 0) + 1;
      setTodayCount(c);
      window.storage.set("prog:today", JSON.stringify({d, c})).catch(()=>{});
      return d;
    });
    // streak
    if (lastDate !== d) {
      const y = new Date(Date.now()-86400000).toISOString().slice(0,10);
      const ns = lastDate === y ? streak + 1 : 1;
      setStreak(ns); setLastDate(d);
      window.storage.set("prog:streak", String(ns)).catch(()=>{});
      window.storage.set("prog:lastDate", d).catch(()=>{});
    }
  };
  const totalSeen = Object.values(seen).reduce((a,b)=>a+b.length,0);

  const toggleDark = () => { const n=!dark; setDark(n); window.storage.set("settings:dark",String(n)).catch(()=>{}); };
  const toggleStress = () => { const n=!showStress; setShowStress(n); window.storage.set("settings:stress",String(n)).catch(()=>{}); };
  const toggleSound = () => { const n=!soundOn; setSoundOn(n); soundOnRef.current=n; window.storage.set("settings:sound",String(n)).catch(()=>{}); if(n) playSound(soundKindRef.current); };
  const chooseSound = (k) => { setSoundKind(k); soundKindRef.current=k; window.storage.set("settings:soundkind",k).catch(()=>{}); playSound(k); };

  /* ── Gemini helper (mit Backoff bei 429/503 + Fallback-Modell) ── */
  const gemini = async (prompt) => {
    let key = "";
    try { key = localStorage.getItem("sp3_gemini_key") || ""; } catch(e){}
    if (!key) throw new Error("Kein API-Key. Tippe auf 🔑 unten links.");
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    const models = ["gemini-2.5-flash", "gemini-2.5-flash-lite", "gemini-flash-latest"];
    const body = JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] });
    let lastErr = "";
    for (const model of models) {
      for (let attempt = 0; attempt < 3; attempt++) {
        let res;
        try {
          res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/" + model +
            ":generateContent?key=" + encodeURIComponent(key),
            { method:"POST", headers:{ "Content-Type":"application/json" }, body });
        } catch(e) { lastErr = "Netzwerkfehler — Verbindung prüfen."; await sleep(700); continue; }
        if (res.ok) {
          const data = await res.json();
          return (data.candidates?.[0]?.content?.parts?.[0]?.text || "").trim();
        }
        if (res.status === 429 || res.status === 503) {
          // Rate-Limit/überlastet: warten und erneut versuchen
          let wait = (attempt + 1) * 1500;
          const ra = res.headers.get("retry-after");
          if (ra && !isNaN(+ra)) wait = Math.min(15000, (+ra) * 1000);
          lastErr = res.status === 429
            ? "Rate-Limit/Kontingent erreicht (429)."
            : "Dienst überlastet (503).";
          if (attempt < 2) { await sleep(wait); continue; }
          break; // dieses Modell aufgeben, nächstes probieren
        }
        if (res.status === 400 || res.status === 401 || res.status === 403) {
          throw new Error("API-Key ungültig oder ohne Berechtigung (" + res.status + "). Key über 🔑 prüfen.");
        }
        if (res.status === 404) { lastErr = "Modell nicht verfügbar (404)."; break; } // nächstes Modell
        lastErr = "API-Fehler " + res.status; break;
      }
    }
    if (lastErr.indexOf("429") >= 0)
      throw new Error("Gemini-Limit erreicht (429): zu viele Anfragen oder das kostenlose Tageskontingent ist erschöpft. Bitte 1–2 Minuten warten und erneut versuchen.");
    throw new Error(lastErr || "Unbekannter API-Fehler.");
  };

  /* ── shared render of a russian phrase (stress on/off) ──── */
  const ru = (text, style) => h("span", { style }, showStress ? text : stripStress(text));

  const ctx = { dark, showStress, ru, speak, speakSeq, setScreen, screen, gemini, toggleDark, toggleStress, speed, setSpeed, noRuVoice, levelsPassed, markLevelPassed, soundOn, toggleSound, soundKind, chooseSound };

  /* ── routing (render as components so each keeps its own hooks) ── */
  let body;
  if (screen === "study")        body = h(StudyScreen, { ...ctx, tIdx, sIdx, setSIdx, revealed, setRevealed, markSeen, seen });
  else if (screen === "topics")  body = h(TopicsScreen, { ...ctx, setTIdx, setSIdx, setRevealed, seen });
  else if (screen === "alphabet")body = h(AlphabetScreen, ctx);
  else if (screen === "vocab")   body = h(VocabScreen, ctx);
  else if (screen === "verbs")   body = h(VerbsScreen, ctx);
  else if (screen === "quiz")    body = h(QuizScreen, ctx);
  else if (screen === "level")   body = h(LevelScreen, ctx);
  else if (screen === "tools")   body = h(ToolsScreen, ctx);
  else if (screen === "news")    body = h(NewsScreen, ctx);
  else                           body = h(MenuScreen, { ...ctx, streak, totalSeen, todayCount, goal, reachedLevel, newsUnseen, markNewsSeen, setTIdx, setSIdx, setRevealed });

  return h("div", { "data-page": screen, style:{ maxWidth:520, margin:"0 auto", padding:"22px 18px 110px", minHeight:"100vh" } },
    body,
    h(BottomNav, { screen, setScreen, dark })
  );
}

/* shared button styles */
const card = { background:"var(--card)", border:"1px solid var(--border)", borderRadius:"var(--r-lg)", boxShadow:"var(--shadow)" };
const pill = active => ({ padding:"8px 14px", borderRadius:"var(--r-full)", border:"1px solid var(--border)",
  background: active ? "var(--accent)" : "var(--card)", color: active ? "#0b0e14" : "var(--text)",
  fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"'Manrope',sans-serif" });
const serif = { fontFamily:"'Fraunces',Georgia,serif" };

function Header(title, sub) {
  return h("div", { style:{ marginBottom:18 } },
    h("h1", { style:{ ...serif, fontSize:30, fontWeight:600, letterSpacing:"-.5px", margin:0 } }, title),
    sub ? h("p", { style:{ color:"var(--text-sub)", fontSize:13.5, margin:"4px 0 0" } }, sub) : null
  );
}

function VoiceNote(show) {
  return show ? h("div", { style:{ fontSize:12, color:"var(--text-faint)", textAlign:"center", margin:"-4px 0 12px", lineHeight:1.45 } },
    "ℹ️ Keine russische Sprachausgabe auf diesem Gerät gefunden. Installiere ein russisches Sprachpaket (System-Einstellungen) oder öffne die App im Chrome-Browser.") : null;
}

function BottomNav({ screen, setScreen, dark }) {
  const items = [["menu","🏠","Start"],["study","📚","Lernen"],["alphabet","🔤","Alphabet"],["verbs","🔧","Verben"],["quiz","🎯","Quiz"],["level","🏆","Niveau"]];

      style:{ flex:1, maxWidth:96, display:"flex", flexDirection:"column", alignItems:"center", gap:2, padding:"6px 4px",
        background:"none", border:"none", cursor:"pointer",
        color: (screen===k || (k==="study"&&(screen==="study"||screen==="topics"))) ? "var(--accent-bright)" : "var(--text-faint)" } },
      h("span",{style:{fontSize:19}},ic),
      h("span",{style:{fontSize:9.5, fontWeight:700, fontFamily:"'Manrope',sans-serif", whiteSpace:"nowrap"}},lb)
    ))
  );
}

        h("div",{ key:i, style:{ ...card, flex:1, padding:"14px 10px", textAlign:"center" } },

     ["🔤","Alphabet","Kyrillisch — Karten & Quiz","alphabet","#22c55e"],

/* ════════════════════════════════════════════════════════════
   TOPICS PICKER

  const { setScreen, setTIdx, setSIdx, setRevealed, ru, seen } = p;
  return h("div", null,
    Header("Themen", "Wähle ein Thema zum Lernen"),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      TOPICS.map((t,i)=>{
        const done = (seen[i]||[]).length, tot = t.sentences.length;
        return h("button",{ key:i, onClick:()=>{ setTIdx(i); setSIdx(0); setRevealed(false); setScreen("study"); },
          style:{ ...card, padding:"16px 14px", cursor:"pointer", textAlign:"left", color:"var(--text)", position:"relative", overflow:"hidden" } },
          h("div",{style:{fontSize:26,marginBottom:6}},t.emoji),
          h("div",{style:{fontSize:14.5,fontWeight:700,lineHeight:1.2}},t.name),
          ru(t.ru,{display:"block",fontSize:13,color:"var(--text-sub)",marginTop:2}),
          h("div",{style:{fontSize:11,color:"var(--text-faint)",marginTop:8}}, done+" / "+tot+" Sätze"),
          h("div",{style:{position:"absolute",left:0,bottom:0,height:3,width:(done/tot*100)+"%",background:t.color}})
        );
      })
    )
  );
}

/* ════════════════════════════════════════════════════════════
   STUDY PLAYER
════════════════════════════════════════════════════════════ */
function StudyScreen(p) {
  const { setScreen, tIdx, sIdx, setSIdx, revealed, setRevealed, ru, speak, speakSeq, markSeen,
          showStress, toggleStress, speed, setSpeed, noRuVoice } = p;
  const [dir, setDir] = useState("de2ru"); // de2ru | ru2de
  const [auto, setAuto] = useState(false);
  const [gap, setGap] = useState(3);     // Pause in Sekunden zwischen Sätzen
  const [loop, setLoop] = useState(false);
  const loopRef = useRef(false); useEffect(()=>{ loopRef.current = loop; }, [loop]);
  const gapRef = useRef(3);     useEffect(()=>{ gapRef.current = gap; }, [gap]);
  const topic = TOPICS[tIdx];
  const pair = topic.sentences[sIdx];
  const [de, rus] = pair;

  const go = (d) => {
    let n = sIdx + d;
    if (n < 0) n = 0;
    if (n >= topic.sentences.length) n = topic.sentences.length - 1;
    setSIdx(n); setRevealed(false);
  };
  const reveal = () => { if (!revealed) { setRevealed(true); markSeen(tIdx, sIdx); speak(rus,"ru"); } };

  // Auto-Play: liest Deutsch + Russisch, wartet, geht weiter (optional Dauerschleife)
  useEffect(() => {
    if (!auto) return;
    let cancelled = false, gapTimer = null, stop = null;
    setRevealed(true);
    markSeen(tIdx, sIdx);
    const items = dir === "ru2de"
      ? [{ text: rus, lang: "ru" }, { text: de, lang: "de" }]
      : [{ text: de, lang: "de" }, { text: rus, lang: "ru" }];
    stop = speakSeq(items, () => {
      if (cancelled) return;
      gapTimer = setTimeout(() => {
        if (cancelled) return;
        if (sIdx + 1 < topic.sentences.length) { setRevealed(false); setSIdx(sIdx + 1); }
        else if (loopRef.current) { setRevealed(false); setSIdx(0); }
        else { setAuto(false); }
      }, Math.max(0, gapRef.current) * 1000);
    });
    return () => { cancelled = true; if (gapTimer) clearTimeout(gapTimer); if (stop) stop(); };
  }, [auto, sIdx, tIdx]);

  const promptIsRu = dir === "ru2de";
  const promptLabel = promptIsRu ? "Russisch" : "Deutsch";
  const answerLabel = promptIsRu ? "Deutsch" : "Russisch";

  return h("div", null,
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
      h("button",{onClick:()=>setScreen("topics"),style:{...pill(false),padding:"6px 12px"}},"‹ Themen"),
      h("div",{style:{textAlign:"center"}},
        h("div",{style:{fontWeight:700,fontSize:15}},topic.emoji+" "+topic.name),
        h("div",{style:{fontSize:11,color:"var(--text-faint)"}}, (sIdx+1)+" / "+topic.sentences.length)),
      h("button",{onClick:toggleStress,style:{...pill(showStress),padding:"6px 12px"},title:"Betonung"}, showStress?"Бе́":"Бе")
    ),
    // direction switch
    h("div",{style:{display:"flex",gap:8,marginBottom:12,justifyContent:"center"}},
      h("button",{onClick:()=>{setDir("de2ru");setRevealed(false);},style:pill(dir==="de2ru")},"DE → RU"),
      h("button",{onClick:()=>{setDir("ru2de");setRevealed(false);},style:pill(dir==="ru2de")},"RU → DE")
    ),

    VoiceNote(noRuVoice),

    // card
    h("div",{ style:{ ...card, padding:"30px 22px", minHeight:230, display:"flex", flexDirection:"column",
        justifyContent:"center", textAlign:"center", marginBottom:16 } },
      h("div",{style:{fontSize:13,color:"var(--text-faint)",marginBottom:14,textTransform:"uppercase",letterSpacing:1}}, promptLabel),
      // prompt
      promptIsRu
        ? h("div",{style:{marginBottom:24}},
            ru(rus,{...serif,fontSize:24,fontWeight:600,lineHeight:1.4,display:"block"}),
            h("button",{onClick:()=>speak(rus,"ru"),style:{...pill(false),marginTop:12,padding:"5px 12px"}},"🔊"))
        : h("div",{style:{...serif,fontSize:21,fontWeight:500,lineHeight:1.35,marginBottom:24}}, de),
      h("div",{style:{height:1,background:"var(--border)",margin:"0 -4px 22px"}}),
      // answer
      revealed
        ? h("div",null,
            h("div",{style:{fontSize:12,color:"var(--text-faint)",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}, answerLabel),
            promptIsRu
              ? h("div",{style:{...serif,fontSize:22,fontWeight:600,lineHeight:1.35,color:"var(--accent-bright)"}}, de)
              : h("div",null,
                  ru(rus,{...serif,fontSize:26,fontWeight:600,lineHeight:1.4,display:"block",color:"var(--accent-bright)"}),
                  h("button",{onClick:()=>speak(rus,"ru"),style:{...pill(false),marginTop:18}},"🔊 Anhören")))
        : h("button",{onClick:reveal,style:{ ...pill(true), padding:"13px 26px", fontSize:15 }}, answerLabel+" zeigen 👁")
    ),

    // controls
    h("div",{style:{display:"flex",gap:10,marginBottom:14}},
      h("button",{onClick:()=>go(-1),disabled:sIdx===0,style:{...card,flex:1,padding:14,cursor:"pointer",color:"var(--text)",fontWeight:700,fontSize:15}},"‹ Zurück"),
      h("button",{onClick:()=>go(1),disabled:sIdx===topic.sentences.length-1,style:{...card,flex:1,padding:14,cursor:"pointer",color:"var(--text)",fontWeight:700,fontSize:15}},"Weiter ›")
    ),
    // auto-play
    h("div",{style:{...card,padding:"14px 16px",marginBottom:12}},
      h("div",{style:{display:"flex",gap:10,alignItems:"center"}},
        h("button",{onClick:()=>setAuto(a=>!a),
          style:{...pill(auto),flex:1,padding:"13px 16px",fontSize:15}}, auto?"⏸ Pause":"▶ Auto-Play"),
        h("button",{onClick:()=>setLoop(l=>!l),title:"Dauerschleife",
          style:{...pill(loop),padding:"13px 15px",fontSize:16}}, "🔁")
      ),
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginTop:12}},
        h("span",{style:{fontSize:13,color:"var(--text-sub)",fontWeight:700}},"Pause"),
        h("input",{type:"number",min:0,max:30,step:0.5,value:gap,
          onChange:e=>setGap(Math.max(0, Math.min(30, parseFloat(e.target.value)||0))),
          style:{width:62,padding:"8px 10px",borderRadius:"var(--r-sm)",border:"1px solid var(--border)",
            background:"var(--card)",color:"var(--text)",fontSize:15,fontFamily:"inherit",textAlign:"center"}}),
        h("span",{style:{fontSize:13,color:"var(--text-sub)"}},"Sek. zwischen Sätzen"),
        h("span",{style:{marginLeft:"auto",fontSize:12,fontWeight:700,color:auto?"var(--accent-bright)":(loop?"var(--text-faint)":"transparent")}},
          auto?"läuft…":(loop?"Schleife an":""))
      ),
      h("div",{style:{fontSize:11.5,color:"var(--text-faint)",marginTop:8,lineHeight:1.4}},
        "Liest automatisch "+(dir==="ru2de"?"Russisch → Deutsch":"Deutsch → Russisch")+" vor und blättert weiter.")
    ),
    // speed
    h("div",{style:{...card,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}},
      h("span",{style:{fontSize:13,color:"var(--text-sub)",fontWeight:700}},"Tempo"),
      h("input",{type:"range",min:0.5,max:1.2,step:0.1,value:speed,onChange:e=>setSpeed(+e.target.value),style:{flex:1,accentColor:"var(--accent)"}}),
      h("span",{style:{fontSize:13,width:34,textAlign:"right"}}, speed.toFixed(1)+"×")
    )
  );
}

/* ════════════════════════════════════════════════════════════
   ALPHABET — Karteikarten + Quiz
════════════════════════════════════════════════════════════ */
function AlphabetScreen(p) {
  const { setScreen, ru, speak, noRuVoice } = p;
  const [mode, setMode] = useState("cards"); // cards | quiz
  const [i, setI] = useState(0);
  const [flip, setFlip] = useState(false);

  // quiz state
  const [q, setQ] = useState(null);
  const [pick, setPick] = useState(null);
  const [qScore, setQScore] = useState({c:0,t:0});

  const newQ = () => {
    const correct = ALPHABET[Math.floor(Math.random()*ALPHABET.length)];
    const opts = [correct];
    let guard = 0;
    while (opts.length < 4 && guard++ < 200) {
      const c = ALPHABET[Math.floor(Math.random()*ALPHABET.length)];
      if (!opts.find(o => o[0]===c[0] || o[3]===c[3])) opts.push(c);
    }
    opts.sort(()=>Math.random()-0.5);
    setQ({ correct, opts }); setPick(null);
  };
  useEffect(()=>{ if (mode==="quiz" && !q) newQ(); }, [mode]);

  const tabBar = h("div",{style:{display:"flex",gap:8,marginBottom:16}},
    h("button",{onClick:()=>setMode("cards"),style:pill(mode==="cards")},"🃏 Karten"),
    h("button",{onClick:()=>{setMode("quiz");newQ();},style:pill(mode==="quiz")},"🎯 Quiz")
  );

  if (mode === "cards") {
    const L = ALPHABET[i];
    const [word, tr, mean] = L[5].split("|");
    return h("div",null,
      Header("Алфави\u0301т","Das kyrillische Alphabet · "+(i+1)+" / "+ALPHABET.length),
      tabBar,
      VoiceNote(noRuVoice),
      h("div",{ onClick:()=>{ setFlip(!flip); if(!flip) speak(L[1],"ru"); },
        style:{ ...card, padding:"34px 22px", minHeight:250, display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center", cursor:"pointer", textAlign:"center", marginBottom:16 } },
        !flip
          ? h("div",null,
              h("div",{style:{...serif,fontSize:84,fontWeight:600,lineHeight:1}}, L[0]+" "+L[1]),
              h("div",{style:{color:"var(--text-faint)",marginTop:14,fontSize:13}},"Tippen zum Umdrehen"))
          : h("div",null,
              h("div",{style:{fontSize:13,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:1}},"Name"),
              ru(L[2],{...serif,fontSize:30,fontWeight:600,display:"block",margin:"4px 0 2px"}),
              h("div",{style:{fontSize:15,color:"var(--accent-bright)",fontWeight:700,marginBottom:10}},"Translit: "+L[3]),
              h("div",{style:{fontSize:14,color:"var(--text-sub)",marginBottom:14,lineHeight:1.4}}, L[4]),
              h("div",{style:{height:1,background:"var(--border)",margin:"4px auto 14px",width:"60%"}}),
              h("div",{style:{fontSize:12,color:"var(--text-faint)"}},"Beispiel"),
              ru(word,{...serif,fontSize:22,fontWeight:600,display:"block"}),
              h("div",{style:{fontSize:13,color:"var(--text-sub)"}}, tr+" — "+mean),
              h("button",{onClick:e=>{e.stopPropagation();speak(word,"ru");},style:{...pill(false),marginTop:12}},"🔊"))
      ),
      h("div",{style:{display:"flex",gap:10}},
        h("button",{onClick:()=>{setI((i-1+ALPHABET.length)%ALPHABET.length);setFlip(false);},style:{...card,flex:1,padding:14,cursor:"pointer",color:"var(--text)",fontWeight:700}},"‹"),
        h("button",{onClick:()=>{speak(ALPHABET[i][1],"ru");},style:{...card,flex:1,padding:14,cursor:"pointer",color:"var(--text)",fontWeight:700}},"🔊"),
        h("button",{onClick:()=>{setI((i+1)%ALPHABET.length);setFlip(false);},style:{...card,flex:1,padding:14,cursor:"pointer",color:"var(--text)",fontWeight:700}},"›")
      )
    );
  }

  // QUIZ
  if (!q) return h("div",null, Header("Алфави\u0301т"), tabBar);
  const ask = q.correct;
  return h("div",null,
    Header("Alphabet-Quiz","Wie wird dieser Buchstabe gelesen? · "+qScore.c+"/"+qScore.t),
    tabBar,
    h("div",{style:{...card,padding:"34px 22px",textAlign:"center",marginBottom:18}},
      h("div",{style:{...serif,fontSize:78,fontWeight:600,lineHeight:1}}, ask[0]+" "+ask[1]),
      h("button",{onClick:()=>speak(ask[1],"ru"),style:{...pill(false),marginTop:14}},"🔊 Laut")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      q.opts.map((o,idx)=>{
        let bg="var(--card)", bc="var(--border)";
        if (pick!==null){
          if (o[0]===ask[0]){bg="#22c55e22";bc="#22c55e";}
          else if (o[0]===pick[0]){bg="#ef444422";bc="#ef4444";}
        }
        return h("button",{ key:idx, disabled:pick!==null,
          onClick:()=>{ setPick(o); setQScore(s=>({c:s.c+(o[0]===ask[0]?1:0),t:s.t+1})); },
          style:{ padding:"14px 12px", borderRadius:"var(--r-md)", border:"1.5px solid "+bc, background:bg,
            color:"var(--text)", cursor:"pointer", textAlign:"center" } },
          h("div",{style:{fontSize:20,color:"var(--accent-bright)",fontWeight:800,fontFamily:"'Fraunces',serif"}}, o[3]),
          h("div",{style:{fontSize:11.5,color:"var(--text-sub)",marginTop:3,lineHeight:1.3}}, o[4])
        );
      })
    ),
    pick!==null ? h("button",{onClick:newQ,style:{...pill(true),width:"100%",padding:14,marginTop:16,fontSize:15}},"Nächste ›") : null
  );
}

/* ════════════════════════════════════════════════════════════
   QUIZ — Vokabeln (de → ru, Multiple Choice)
════════════════════════════════════════════════════════════ */
function QuizScreen(p) {
  const { ru, speak } = p;
  const all = [];
  TOPICS.forEach(t => t.sentences.forEach(s => all.push(s)));
  const [q, setQ] = useState(null);
  const [pick, setPick] = useState(null);
  const [score, setScore] = useState({c:0,t:0});

  const newQ = () => {
    const correct = all[Math.floor(Math.random()*all.length)];
    const opts = [correct];
    while (opts.length < 4) {
      const c = all[Math.floor(Math.random()*all.length)];
      if (!opts.find(o=>o[1]===c[1])) opts.push(c);
    }
    opts.sort(()=>Math.random()-0.5);
    setQ({ correct, opts }); setPick(null);
  };
  useEffect(()=>{ if(!q) newQ(); }, []);
  if (!q) return h("div",null,Header("Quiz"));

  return h("div",null,
    Header("Quiz","Wähle die richtige Übersetzung · "+score.c+"/"+score.t),
    h("div",{style:{...card,padding:"26px 20px",textAlign:"center",marginBottom:18}},
      h("div",{style:{fontSize:12,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}},"Deutsch"),
      h("div",{style:{...serif,fontSize:22,fontWeight:600,lineHeight:1.3}}, q.correct[0])
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      q.opts.map((o,idx)=>{
        let bg="var(--card)", bc="var(--border)";
        if (pick!==null){
          if (o[1]===q.correct[1]){bg="#22c55e22";bc="#22c55e";}
          else if (o[1]===pick[1]){bg="#ef444422";bc="#ef4444";}
        }
        return h("button",{key:idx,disabled:pick!==null,
          onClick:()=>{ setPick(o); const ok=o[1]===q.correct[1]; setScore(s=>({c:s.c+(ok?1:0),t:s.t+1})); if(ok) speak(o[1],"ru"); },
          style:{ padding:"15px 16px", borderRadius:"var(--r-md)", border:"1.5px solid "+bc, background:bg,
            color:"var(--text)", cursor:"pointer", textAlign:"left" } },
          ru(o[1],{...serif,fontSize:18,fontWeight:600})
        );
      })
    ),
    pick!==null ? h("button",{onClick:newQ,style:{...pill(true),width:"100%",padding:14,marginTop:16,fontSize:15}},"Nächste ›") : null
  );
}

/* ════════════════════════════════════════════════════════════
   WERKZEUGE — KI (Generator · Partner · Analyse) + Einstellungen
════════════════════════════════════════════════════════════ */
function ToolsScreen(p) {
  const { gemini, ru, speak, dark, toggleDark, showStress, toggleStress, soundOn, toggleSound, soundKind, chooseSound } = p;
  const [tab, setTab] = useState("generate");

  // generator
  const [topic, setTopic] = useState("");
  const [genOut, setGenOut] = useState([]);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const doGenerate = async () => {
    setBusy(true); setErr(""); setGenOut([]);
    try {
      const t = topic.trim() || "Alltag";
      const out = await gemini(
        "Erzeuge 6 einfache russische Beispielsätze zum Thema \""+t+"\" für deutschsprachige Anfänger. "+
        "Setze in jedem russischen Wort mit mehreren Silben ein Betonungszeichen, indem du direkt NACH dem betonten Vokal das Zeichen U+0301 (kombinierender Akut) einfügst. "+
        "Gib NUR gültiges JSON zurück, ohne Markdown, als Array von Objekten: [{\"ru\":\"...\",\"de\":\"...\"}]. Keine Erklärungen.");
      let txt = out.replace(/```json|```/g,"").trim();
      const arr = JSON.parse(txt);
      setGenOut(arr);
    } catch(e){ setErr(e.message || "Fehler"); }
    setBusy(false);
  };

  // partner chat
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const sendChat = async () => {
    const text = input.trim(); if (!text) return;
    const nm = [...msgs, {role:"user", text}];
    setMsgs(nm); setInput(""); setBusy(true); setErr("");
    try {
      const hist = nm.map(m => (m.role==="user"?"Schüler":"Tutor")+": "+m.text).join("\n");
      const out = await gemini(
        "Du bist ein freundlicher Russisch-Tutor für einen deutschen Lerner. Antworte KURZ (1-2 Sätze) auf Russisch "+
        "mit Betonungszeichen (U+0301 nach dem betonten Vokal), danach in Klammern die deutsche Übersetzung. "+
        "Stelle eine einfache Rückfrage.\n\nVerlauf:\n"+hist+"\nTutor:");
      setMsgs(m=>[...m,{role:"tutor",text:out}]);
    } catch(e){ setErr(e.message); }
    setBusy(false);
  };

  // analysis
  const [aIn, setAIn] = useState("");
  const [aOut, setAOut] = useState("");
  const doAnalyze = async () => {
    if (!aIn.trim()) return;
    setBusy(true); setErr(""); setAOut("");
    try {
      const out = await gemini(
        "Analysiere diesen russischen Satz für einen deutschen Lerner: \""+aIn.trim()+"\". "+
        "Gib auf Deutsch eine kurze, klare Erklärung: Wort-für-Wort-Bedeutung, Fälle/Kasus, Verbform und eine natürliche Übersetzung. "+
        "Verwende einfache Stichpunkte mit '- '.");
      setAOut(out);

    setBusy(false);
  };

  const tabBtn = (k,l) => h("button",{onClick:()=>{setTab(k);setErr("");},style:pill(tab===k)},l);
  const ta = { width:"100%", padding:"12px 14px", borderRadius:"var(--r-md)", border:"1px solid var(--border)",
    background:"var(--card)", color:"var(--text)", fontSize:15, fontFamily:"inherit", resize:"vertical", outline:"none" };
  const btn = { ...pill(true), padding:"12px 20px", fontSize:15, marginTop:12 };

  return h("div",null,
    Header("Werkzeuge","KI-gestützt (Gemini)"),
    h("div",{style:{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}},
      tabBtn("generate","✨ Generator"), tabBtn("partner","💬 Partner"), tabBtn("analyze","🔍 Analyse"), tabBtn("settings","⚙️ Einstellungen")),

    err ? h("div",{style:{color:"#fca5a5",fontSize:13,marginBottom:12,padding:"10px 12px",background:"#ef444415",borderRadius:"var(--r-sm)"}}, err) : null,

    tab==="generate" ? h("div",null,
      h("input",{value:topic,onChange:e=>setTopic(e.target.value),placeholder:"Thema (z.B. Im Café)",style:{...ta,marginBottom:0}}),
      h("button",{onClick:doGenerate,disabled:busy,style:btn}, busy?"…":"6 Sätze erzeugen"),
      h("div",{style:{marginTop:16,display:"flex",flexDirection:"column",gap:10}},
        genOut.map((s,i)=>h("div",{key:i,style:{...card,padding:"14px 16px"}},
          h("div",{style:{display:"flex",justifyContent:"space-between",gap:10}},
            ru(s.ru,{...serif,fontSize:18,fontWeight:600,flex:1}),
            h("button",{onClick:()=>speak(s.ru,"ru"),style:{...pill(false),padding:"4px 10px"}},"🔊")),
          h("div",{style:{fontSize:13.5,color:"var(--text-sub)",marginTop:3}}, s.de)
        )))
    ) : null,

    tab==="partner" ? h("div",null,
      h("div",{style:{display:"flex",flexDirection:"column",gap:10,marginBottom:12,minHeight:120}},
        msgs.length===0 ? h("div",{style:{color:"var(--text-faint)",fontSize:14,textAlign:"center",padding:"20px 0"}},"Schreibe etwas — auf Deutsch oder Russisch.") : null,
        msgs.map((m,i)=>h("div",{key:i,style:{...card,padding:"12px 14px",alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"88%",
            background:m.role==="user"?"var(--accent-soft)":"var(--card)"}},
          m.role==="user" ? h("div",{style:{fontSize:15}},m.text) : ru(m.text,{fontSize:15,lineHeight:1.45})
        ))),
      h("div",{style:{display:"flex",gap:8}},
        h("input",{value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>{if(e.key==="Enter")sendChat();},placeholder:"Nachricht…",style:{...ta,flex:1}}),
        h("button",{onClick:sendChat,disabled:busy,style:{...pill(true),padding:"0 18px"}}, busy?"…":"➤"))
    ) : null,

    tab==="analyze" ? h("div",null,
      h("textarea",{value:aIn,onChange:e=>setAIn(e.target.value),rows:2,placeholder:"Russischen Satz einfügen…",style:ta}),
      h("button",{onClick:doAnalyze,disabled:busy,style:btn}, busy?"…":"Analysieren"),
      aOut ? h("div",{style:{...card,padding:"16px 18px",marginTop:14,fontSize:14.5,lineHeight:1.6,whiteSpace:"pre-wrap"}}, aOut) : null
    ) : null,

    tab==="settings" ? h("div",null,

          h("button",{onClick:fn,style:{width:50,height:28,borderRadius:99,border:"none",cursor:"pointer",position:"relative",

            h("div",{style:{position:"absolute",top:3,left:on?25:3,width:22,height:22,borderRadius:99,background:"#fff",transition:"left .2s"}})))),

        h("div",{style:{fontSize:12,color:"var(--text-faint)",marginTop:8}},"Tippen zum Anhören.")
      ) : null,

/* ════════════════════════════════════════════════════════════
   NIVEAU-TEST — B1 bis C2 (Multiple Choice · Lücke · Eingabe)
════════════════════════════════════════════════════════════ */
function LevelScreen(p) {
  const { ru, speak, levelsPassed, markLevelPassed } = p;
  const [step, setStep] = useState("list");   // list | quiz | result
  const [level, setLevel] = useState(null);
  const [qs, setQs] = useState([]);
  const [qi, setQi] = useState(0);
  const [correct, setCorrect] = useState(0);
  const [picked, setPicked] = useState(null);
  const [inputVal, setInputVal] = useState("");
  const [checked, setChecked] = useState(false);

  const reached = (() => { let r = "—"; for (const L of LEVELS_ORDER){ if (levelsPassed[L]) r = L; else break; } return r; })();
  const isUnlocked = (L) => { const idx = LEVELS_ORDER.indexOf(L); return idx === 0 || !!levelsPassed[LEVELS_ORDER[idx-1]]; };

  const buildQuiz = (L) => {
    const pool = LEVEL_DATA[L];
    const items = shuffle(pool).slice(0, 8);
    const types = shuffle(["mc","mc","mc","mc","cloze","cloze","input","input"]);
    return items.map((it, idx) => {
      const [de, rus, gap] = it;
      const t = types[idx];
      if (t === "mc") {
        const others = shuffle(pool.filter(x => x[1] !== rus)).slice(0,3).map(x => x[1]);
        return { t, de, rus, options: shuffle([rus, ...others]), answer: rus };
      }
      if (t === "cloze") {
        const re = new RegExp(gap.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "i");
        const blanked = rus.replace(re, "_____");
        const others = shuffle(pool.filter(x => x[2] !== gap).map(x => x[2]).filter((v,i,a)=>a.indexOf(v)===i)).slice(0,3);
        const opts = [gap, ...others].filter((v,i,a)=>a.indexOf(v)===i);
        return { t, de, rus, blanked, options: shuffle(opts), answer: gap };
      }
      return { t:"input", de, rus, answer: rus };
    });
  };

  const start = (L) => { setLevel(L); setQs(buildQuiz(L)); setQi(0); setCorrect(0); setPicked(null); setInputVal(""); setChecked(false); setStep("quiz"); };

  const PASS = 7; // von 8

  const submit = () => {
    const q = qs[qi];
    let ok;
    if (q.t === "input") ok = normRu(inputVal) === normRu(q.answer);
    else ok = picked === q.answer;
    setChecked(true);
    if (ok) setCorrect(c => c + 1);
    if (q.t !== "input" && q.t === "mc") speak(q.answer, "ru");
  };
  const next = () => {
    if (qi + 1 >= qs.length) {
      if (correct >= PASS) markLevelPassed(level);
      setStep("result");
    } else { setQi(qi+1); setPicked(null); setInputVal(""); setChecked(false); }
  };

  // ── LIST ──
  if (step === "list") {
    return h("div", null,
      Header("Niveau-Test", "Wo stehst du? Teste dich von B1 bis C2."),
      h("div",{style:{...card,padding:"18px 16px",marginBottom:18,textAlign:"center"}},
        h("div",{style:{fontSize:12,color:"var(--text-sub)",textTransform:"uppercase",letterSpacing:1}},"Erreichtes Niveau"),
        h("div",{style:{...serif,fontSize:40,fontWeight:700,color:"var(--accent-bright)",lineHeight:1.1,marginTop:2}}, reached)),
      LEVELS_ORDER.map(L => {
        const passed = !!levelsPassed[L], open = isUnlocked(L);
        return h("button",{ key:L, disabled:!open, onClick:()=>open&&start(L),
          style:{ ...card, width:"100%", display:"flex", alignItems:"center", gap:14, padding:"15px 16px",
            marginBottom:10, cursor:open?"pointer":"not-allowed", textAlign:"left", color:"var(--text)", opacity:open?1:.55 } },
          h("div",{style:{width:46,height:46,borderRadius:13,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:18,fontWeight:800,background:passed?"#22c55e22":"var(--accent-soft)",color:passed?"#22c55e":"var(--accent-bright)",flexShrink:0,fontFamily:"'Fraunces',serif"}}, L),
          h("div",{style:{flex:1}},
            h("div",{style:{fontSize:15.5,fontWeight:700}}, "Niveau "+L+(passed?" ✓":"")),
            h("div",{style:{fontSize:12.5,color:"var(--text-sub)",marginTop:1}}, open?LEVEL_DESC[L]:"Bestehe zuerst "+LEVELS_ORDER[LEVELS_ORDER.indexOf(L)-1])),
          h("span",{style:{color:"var(--text-faint)",fontSize:18}}, open?"›":"🔒")
        );
      }),
      h("div",{style:{fontSize:12,color:"var(--text-faint)",marginTop:6,lineHeight:1.5}},
        "8 Fragen pro Stufe (Multiple Choice, Lücke, freie Eingabe). Ab 7 von 8 gilt die Stufe als bestanden.")
    );
  }

  // ── RESULT ──
  if (step === "result") {
    const passed = correct >= PASS;
    return h("div", null,
      Header("Ergebnis", "Niveau "+level),
      h("div",{style:{...card,padding:"34px 22px",textAlign:"center",marginBottom:18}},
        h("div",{style:{fontSize:54}}, passed?"🏆":"💪"),
        h("div",{style:{...serif,fontSize:30,fontWeight:700,marginTop:6}}, correct+" / "+qs.length),
        h("div",{style:{fontSize:15,color:passed?"#22c55e":"var(--text-sub)",fontWeight:700,marginTop:6}},
          passed?("Bestanden! Niveau "+level+" gemeistert."):"Noch nicht bestanden — versuch es nochmal."),
        passed && LEVELS_ORDER.indexOf(level)<LEVELS_ORDER.length-1
          ? h("div",{style:{fontSize:13,color:"var(--text-sub)",marginTop:8}}, "Niveau "+LEVELS_ORDER[LEVELS_ORDER.indexOf(level)+1]+" ist jetzt frei.") : null
      ),
      h("div",{style:{display:"flex",gap:10}},
        h("button",{onClick:()=>start(level),style:{...card,flex:1,padding:14,cursor:"pointer",color:"var(--text)",fontWeight:700}},"Nochmal"),
        h("button",{onClick:()=>setStep("list"),style:{...pill(true),flex:1,padding:14,fontSize:15}},"Zur Übersicht")
      )
    );
  }

  // ── QUIZ ──
  const q = qs[qi];
  const ta = { width:"100%", padding:"13px 14px", borderRadius:"var(--r-md)", border:"1px solid var(--border)",
    background:"var(--card)", color:"var(--text)", fontSize:17, fontFamily:"'Fraunces',serif", outline:"none" };

  const optBtn = (label, value, isCorrect) => {
    let bg="var(--card)", bc="var(--border)";
    if (checked){ if (isCorrect){bg="#22c55e22";bc="#22c55e";} else if (value===picked){bg="#ef444422";bc="#ef4444";} }
    return h("button",{ key:value, disabled:checked, onClick:()=>setPicked(value),
      style:{ padding:"14px 16px", borderRadius:"var(--r-md)", border:"1.5px solid "+(value===picked&&!checked?"var(--accent)":bc),
        background:bg, color:"var(--text)", cursor:"pointer", textAlign:"left" } }, label);
  };

  const typeLabel = q.t==="mc" ? "Wähle die richtige Übersetzung" : q.t==="cloze" ? "Welches Wort fehlt?" : "Tippe die russische Übersetzung";

  return h("div", null,
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
      h("button",{onClick:()=>setStep("list"),style:{...pill(false),padding:"6px 12px"}},"‹ Abbrechen"),
      h("div",{style:{fontWeight:700}}, "Niveau "+level),
      h("div",{style:{fontSize:12,color:"var(--text-faint)"}}, (qi+1)+" / "+qs.length)
    ),
    // progress
    h("div",{style:{height:6,borderRadius:6,background:"var(--border)",overflow:"hidden",marginBottom:16}},
      h("div",{style:{height:"100%",width:(qi/qs.length*100)+"%",background:"var(--accent)"}})),

    h("div",{style:{fontSize:12,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}, typeLabel),

    // question body
    q.t==="mc" ? h("div",null,
      h("div",{style:{...card,padding:"20px 18px",marginBottom:16,textAlign:"center"}},
        h("div",{style:{...serif,fontSize:20,fontWeight:600,lineHeight:1.3}}, q.de)),
      h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        q.options.map(o => optBtn(ru(o,{...serif,fontSize:17,fontWeight:600}), o, o===q.answer)))
    ) : null,

    q.t==="cloze" ? h("div",null,
      h("div",{style:{...card,padding:"20px 18px",marginBottom:6,textAlign:"center"}},
        ru(q.blanked,{...serif,fontSize:20,fontWeight:600,lineHeight:1.4,display:"block"})),
      h("div",{style:{fontSize:13,color:"var(--text-sub)",textAlign:"center",marginBottom:14}}, q.de),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        q.options.map(o => optBtn(ru(o,{...serif,fontSize:16,fontWeight:600}), o, o===q.answer)))
    ) : null,

    q.t==="input" ? h("div",null,
      h("div",{style:{...card,padding:"20px 18px",marginBottom:14,textAlign:"center"}},
        h("div",{style:{...serif,fontSize:20,fontWeight:600,lineHeight:1.3}}, q.de)),
      h("input",{value:inputVal,disabled:checked,onChange:e=>setInputVal(e.target.value),
        onKeyDown:e=>{if(e.key==="Enter"&&!checked&&inputVal.trim())submit();},
        placeholder:"Auf Russisch tippen…", style:ta}),
      checked ? h("div",{style:{...card,padding:"12px 14px",marginTop:12,
          border:"1.5px solid "+(normRu(inputVal)===normRu(q.answer)?"#22c55e":"#ef4444")}},
        h("div",{style:{fontSize:12,color:"var(--text-faint)",marginBottom:3}}, normRu(inputVal)===normRu(q.answer)?"Richtig ✓":"Richtige Lösung:"),
        ru(q.answer,{...serif,fontSize:18,fontWeight:600})) : null
    ) : null,

    // action
    h("div",{style:{marginTop:18}},
      !checked
        ? h("button",{ disabled: q.t==="input" ? !inputVal.trim() : picked===null, onClick:submit,
            style:{...pill(true),width:"100%",padding:14,fontSize:15} }, "Prüfen")
        : h("button",{ onClick:next, style:{...pill(true),width:"100%",padding:14,fontSize:15} },
            qi+1>=qs.length ? "Ergebnis ansehen" : "Weiter ›"))
  );
}


/* ════════════════════════════════════════════════════════════
   WORTSCHATZ — Karteikarten + Quiz (häufigste Wörter)
════════════════════════════════════════════════════════════ */
function VocabScreen(p) {
  const { ru, speak } = p;
  const [mode, setMode] = useState("cards"); // cards | quiz
  const [cat, setCat] = useState("Alle");
  const [i, setI] = useState(0);
  const [flip, setFlip] = useState(false);
  const [q, setQ] = useState(null);
  const [pick, setPick] = useState(null);
  const [score, setScore] = useState({c:0,t:0});

  const list = cat === "Alle" ? VOCAB : VOCAB.filter(v => v[2] === cat);
  const idx = Math.min(i, list.length - 1);

  const newQ = () => {
    const pool = list.length >= 4 ? list : VOCAB;
    const correct = pool[Math.floor(Math.random()*pool.length)];
    const opts = [correct];
    while (opts.length < 4) {
      const c = VOCAB[Math.floor(Math.random()*VOCAB.length)];
      if (!opts.find(o => o[1] === c[1])) opts.push(c);
    }
    opts.sort(()=>Math.random()-0.5);
    setQ({ correct, opts }); setPick(null);
  };
  useEffect(()=>{ if (mode==="quiz") newQ(); }, [mode, cat]);

  const chips = h("div",{style:{display:"flex",gap:7,overflowX:"auto",paddingBottom:6,marginBottom:14,WebkitOverflowScrolling:"touch"}},
    ["Alle",...VOCAB_CATS].map(c =>
      h("button",{key:c,onClick:()=>{setCat(c);setI(0);setFlip(false);},
        style:{...pill(cat===c),whiteSpace:"nowrap",flexShrink:0,fontSize:12.5,padding:"7px 13px"}}, c)));

  const tabBar = h("div",{style:{display:"flex",gap:8,marginBottom:12}},
    h("button",{onClick:()=>setMode("cards"),style:pill(mode==="cards")},"🃏 Karten"),
    h("button",{onClick:()=>setMode("quiz"),style:pill(mode==="quiz")},"🎯 Quiz")
  );

  if (mode === "cards") {
    const w = list[idx] || VOCAB[0];
    return h("div",null,
      Header("Wortschatz","Die häufigsten Wörter · "+(idx+1)+" / "+list.length),
      tabBar, chips,
      h("div",{ onClick:()=>{ setFlip(!flip); if(!flip) speak(w[0],"ru"); },
        style:{ ...card, padding:"40px 22px", minHeight:200, display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center", cursor:"pointer", textAlign:"center", marginBottom:16 } },
        !flip
          ? h("div",null,
              ru(w[0],{...serif,fontSize:38,fontWeight:600,lineHeight:1.15,display:"block"}),
              h("div",{style:{color:"var(--text-faint)",marginTop:14,fontSize:13}},"Tippen zum Umdrehen"))
          : h("div",null,
              h("div",{style:{fontSize:12,color:"var(--text-faint)",textTransform:"uppercase",letterSpacing:1}},"Deutsch"),
              h("div",{style:{...serif,fontSize:30,fontWeight:600,margin:"4px 0 8px"}}, w[1]),
              h("div",{style:{fontSize:12,color:"var(--accent-bright)",fontWeight:700}}, w[2]),
              ru(w[0],{fontSize:16,color:"var(--text-sub)",marginTop:10,display:"block"}),
              h("button",{onClick:e=>{e.stopPropagation();speak(w[0],"ru");},style:{...pill(false),marginTop:12}},"🔊"))
      ),
      h("div",{style:{display:"flex",gap:10}},
        h("button",{onClick:()=>{setI((idx-1+list.length)%list.length);setFlip(false);},style:{...card,flex:1,padding:14,cursor:"pointer",color:"var(--text)",fontWeight:700}},"‹"),
        h("button",{onClick:()=>{speak(w[0],"ru");},style:{...card,flex:1,padding:14,cursor:"pointer",color:"var(--text)",fontWeight:700}},"🔊"),
        h("button",{onClick:()=>{setI(Math.floor(Math.random()*list.length));setFlip(false);},style:{...card,flex:1,padding:14,cursor:"pointer",color:"var(--text)",fontWeight:700}},"🔀"),
        h("button",{onClick:()=>{setI((idx+1)%list.length);setFlip(false);},style:{...card,flex:1,padding:14,cursor:"pointer",color:"var(--text)",fontWeight:700}},"›")
      )
    );
  }

  if (!q) return h("div",null, Header("Wortschatz"), tabBar, chips);
  const ask = q.correct;
  return h("div",null,
    Header("Wortschatz-Quiz","Was bedeutet das Wort? · "+score.c+"/"+score.t),
    tabBar, chips,
    h("div",{style:{...card,padding:"30px 22px",textAlign:"center",marginBottom:18}},
      ru(ask[0],{...serif,fontSize:34,fontWeight:600,display:"block"}),
      h("button",{onClick:()=>speak(ask[0],"ru"),style:{...pill(false),marginTop:12}},"🔊 Anhören")
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      q.opts.map((o,k)=>{
        let bg="var(--card)", bc="var(--border)";
        if (pick!==null){ if(o[1]===ask[1]){bg="#22c55e22";bc="#22c55e";} else if(o[1]===pick[1]){bg="#ef444422";bc="#ef4444";} }
        return h("button",{key:k,disabled:pick!==null,
          onClick:()=>{ setPick(o); const ok=o[1]===ask[1]; setScore(s=>({c:s.c+(ok?1:0),t:s.t+1})); if(ok) speak(ask[0],"ru"); },
          style:{padding:"15px 16px",borderRadius:"var(--r-md)",border:"1.5px solid "+bc,background:bg,color:"var(--text)",cursor:"pointer",textAlign:"left",fontSize:16,fontWeight:600}},
          o[1])
      })
    ),
    pick!==null ? h("button",{onClick:newQ,style:{...pill(true),width:"100%",padding:14,marginTop:16,fontSize:15}},"Nächste ›") : null
  );
}

/* ════════════════════════════════════════════════════════════
   WAS IST NEU
════════════════════════════════════════════════════════════ */
function NewsScreen(p) {
  const { setScreen } = p;
  return h("div", null,
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
      h("button",{onClick:()=>setScreen("menu"),style:{...pill(false),padding:"6px 12px"}},"‹ Start"),
      h("div",{style:{fontWeight:700}},"Was ist neu"),
      h("div",{style:{width:60}})
    ),
    NEWS.map((n,i)=>
      h("div",{key:i,style:{...card,padding:"16px 18px",marginBottom:12}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},

            background:i===0?"var(--accent)":"var(--accent-soft)",color:i===0?"#0b0e14":"var(--accent-bright)"}}, "v"+n.ver)),
        n.items.map((it,k)=>

            h("span",null,it)))
      ))
  );
}
